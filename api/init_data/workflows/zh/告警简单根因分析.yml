        - id: cd35fff4-a037-4e72-af99-2ff8299fc5d2
          role: system
          text: 你是可观测性领域的智能助手，协助用户分析解决问题。
        - id: 2b2ad468-efcd-4bcc-aeb9-d53d2f2770ad
          role: user
          text: "# 分析目标\n基于NET消耗的异常线程数据和RTT异常长数据，判断应用实例{{#17430589567120.pod#}}是否受告警事件{{#1742807803325.alertName#}}影响，并进行初步根因定位。\n\
            \n# 输入数据规范\n- 线程在北极星指标NET上的异常消耗样本。\n- Pod相关下游容器网络链路延迟异常消耗样本。\n\n# 分析规则\n\
            1. **主异常方向判定**\n- 标注异常线程的延迟均值。\n- 识别延迟增幅最显著的线程。\n- 根据RTT识别是自身异常还是下游异常\n\
            2. **网络链路延迟识别思路**\n- 网络链路延迟显著增高或接近0.05s附近\n- 若只有个别网络链路延迟出现异常（比如只有一个下游网络链路延迟异常）则认为网络异常是由下游导致，而非自身网络问题\n\
            - 若有多个网络链路延迟同步出现异常（比如有3个及以上下游网络链路延迟异常）则认为是容器自身网络出现问题，进而影响了网络链路延迟.\n3.\
            \ \n若无相关NET或网络链路延迟异常数据，则认为该时间段内对应数据无明显异常，可能只是出现短时间小幅波动。提示用户该数据无异常。\n\n\
            # 输出格式\n**应用实例**:{{#17430589567120.pod#}}  \n**北极星指标趋势摘要**\n- 按指标维度描述显著变化，若无异常标注\"\
            未观测到显著偏离\"。\n**与下游容器网络链路延迟分析**\n- 如果是下游网络链路延迟异常则列出异常的网络链路延迟和对应下游。\n- 如果是自身网络导致下游网络链路延迟异常则给出造成的影响并说明是自身原因导致与下游的网络链路延迟升高\n\
            - 最后根据分析规则判断错误方向。\n\n\n**初步根因结论**\n- 明确告警事件对应用的影响状态。\n- 基于北极星指标与分析规则输出单一归因结论。\n\
            \n# 输入数据\n- 北极星指标NET消耗异常均值最高的实例{{#1747356893645.top_abnormal_means#}}，北极星指标NET消耗异常增速均值最高的实例{{#1747356893645.top_abnormal_growths#}}\n\
            - 容器网络链路延迟异常消耗均值最高的实例{{#1747356923703.top_abnormal_means#}}\n容器网络链路延迟异常增速均值最高的实例\n\
            \n# 输出准则\n- 使用简洁的非技术表述，避免歧义。\n- 结论需聚焦可执行建议（如\"检查代码嵌套\"而非\"可能存在性能问题\"）。"
