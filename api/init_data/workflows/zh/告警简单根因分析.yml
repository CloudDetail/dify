        - id: cd35fff4-a037-4e72-af99-2ff8299fc5d2
          role: system
          text: 你是可观测性领域的智能助手，协助用户分析解决问题。
        - id: 2b2ad468-efcd-4bcc-aeb9-d53d2f2770ad
          role: user
          text: "# 分析目标  \n基于跨资源类别的异常线程数据，判断应用实例 {{#1741497181784.pod#}}是否受告警事件 {{#1742807803325.alertName#}}\
            \ 影响，并进行初步根因定位。  \n\n# 输入数据规范  \n- **分资源类别数据**：线程延迟及关联的北极星指标（如网络类延迟对应网络RTT）。\
            \  \n- **异常数据点计数**：延迟超过同类型线程历史均值20%的实例数，需标注线程延迟均值。  \n\n# 分析规则  \n1. **主异常方向判定**\
            \  \n   - 标注异常线程的延迟均值。  \n   - 识别延迟增幅最显著的资源类型（如延迟从毫秒级跃升至秒级）。  \n   - **线程数量优先原则**：若某资源类型（如网络/epoll）的异常线程数量最多，则归因至该类别。\
            \  \n     *示例：网络/epoll类异常线程4条 vs CPU类2条 → 归因为网络问题。*  \n\n2. **误判规避** \
            \ \n   - 若CPU或运行队列（RunQ）延迟突增且无并发网络/epoll异常，优先归因为CPU资源争用。  \n\n3. **决胜优先级（降序）**\
            \  \n   `CPU > 网络 > Epoll > 文件 > RunQ`  \n\n# 根因归因与建议  \n- **CPU延迟突增**：检查代码过度嵌套问题，确认后执行版本回滚。\
            \  \n- **CPU抢占过高**：排查同节点进程的资源争用。  \n- **网络/Epoll延迟突增**：  \n  - 若RTT异常\
            \ → 网络链路问题；  \n  - 若RTT正常 → 下游服务延迟问题。  \n- **文件操作延迟升高**：审计文件句柄泄漏。  \n\n\
            # 输出格式  \n**应用实例**: {{#1741497181784.pod#}}\n**北极星指标趋势摘要**  \n- 按指标维度描述显著变化，若无异常标注\"\
            未观测到显著偏离\"。  \n\n**初步根因结论**  \n- 明确告警事件对应用的影响状态。  \n- 基于北极星指标与分析规则输出单一归因结论。\
            \  \n  *注：若网络/Epoll类异常但RTT正常，归因为下游服务延迟。*  \n\n# 输入数据  \n- CPU：{{#1744342920172.result#}}\n\
            - 网络：{{#1744342846753.result#}}\n- 文件：{{#1744342890395.result#}} \n- Epoll：{{#1744342800777.result#}}\
            \ \n- RunQ：{{#1744342609856.result#}}  \n\n# 输出准则  \n- 使用简洁的非技术表述，避免歧义。\
            \  \n- 结论需聚焦可执行建议（如\"检查代码嵌套\"而非\"可能存在性能问题\"）。"
        selected: false
