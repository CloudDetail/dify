    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        model:
          completion_params:
            temperature: 0.6
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: 169877de-aa4a-44db-90ef-2cc8f68882c4
          role: system
          text: 你是可观测性领域的智能助手，协助用户分析解决问题。
        - id: c9d29276-dfa5-4042-b1c6-562260f9cc7c
          role: user
          text: '# 目的

            基于服务层级聚合Pod信息并输出服务级概览报告。需确保各Pod具体运行状态的可视化呈现清晰直观。

            同时在原有的结论基础上，针对异常线程最多的根因方向给出具体执行解决问题的建议和与问题相关的需要执行的命令。

            比如：

            根因为CPU：使用top -H -p <PID>查看占用，pidstat -t -p <PID> 1查看使用率等命令

            根因为网络质量问题：ss -s查看全局socket状态，ss -tunap查看所有TCP/UDP连接，nstat -z 查看重传等命令

            根因为EPOLL：strace -e epoll_wait,epoll_pwait -tt -T -p <PID>追踪epoll调用耗时，perf
            trace -e epoll:*查看epoll相关事件等命令

            根因为CPU抢占（runq）：dstat -l 1 查看系统负载，mpstat -P ALL 1查看CPU的%idle和%util等命令

            根因为文件读取（file）：iotop -o -p <PID>查看进程级磁盘IO，strace -e trace=file -tt -T -p
            <PID>查看文件相关的系统调用等命令


            # 注意事项

            1. 结论中若CPU相关告警事件综合影响系数较高，应优先指导处理CPU资源瓶颈

            2. 采用树状层级化输出格式，服务级汇总指标与Pod明细指标需通过缩进形成清晰继承关系

            3. 故障归因分析需保持单一维度，禁止构建跨维度关联（如GC与锁竞争）

            4. 当网络栈耗时(net)异常增高但网络往返延迟(RTT)处于基线范围时，需重点提示检查下游依赖服务


            # 结论数据源

            {{#1754385689812.output#}}


            '
