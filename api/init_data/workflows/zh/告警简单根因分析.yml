    - data:
        code: "import json\n\ndef main(cpu, net, runq, report):\n    cpu_reports =\
          \ json.loads(cpu).get('data', [])\n    net_reports = json.loads(net).get('data',\
          \ [])\n    runq_reports = json.loads(runq).get('data', [])\n    report =\
          \ append_report_links(cpu_reports, net_reports, runq_reports, report)\n\
          \    return {\n        \"result\": report\n    }\n\ndef append_report_links(cpu_links,\
          \ net_links, runq_links, report):\n    \"\"\"\n    Appends valid report\
          \ links in markdown format to the end of the report.\n    \n    Args:\n\
          \        cpu_links (list): List of CPU report URLs\n        runq_links (list):\
          \ List of run queue report URLs\n        net_links (list): List of network\
          \ report URLs\n        report (str): Original markdown report\n        \n\
          \    Returns:\n        str: Updated markdown report with links appended\n\
          \    \"\"\"\n    link_sections = []\n    \n    if cpu_links and any(cpu_links):\n\
          \        valid_cpu_links = [link for link in cpu_links if link and link.strip()]\n\
          \        if valid_cpu_links:\n            cpu_section = \"- **CPU方向报告**：\"\
          \ + \", \".join(f\"[报告{i+1}]({link})\" \n                              \
          \                          for i, link in enumerate(valid_cpu_links))\n\
          \            link_sections.append(cpu_section)\n    \n    if net_links and\
          \ any(net_links):\n        valid_net_links = [link for link in net_links\
          \ if link and link.strip()]\n        if valid_net_links:\n            net_section\
          \ = \"- **网络方向报告**：\" + \", \".join(f\"[报告{i+1}]({link})\" \n          \
          \                                             for i, link in enumerate(valid_net_links))\n\
          \            link_sections.append(net_section)\n    \n    if runq_links\
          \ and any(runq_links):\n        valid_runq_links = [link for link in runq_links\
          \ if link and link.strip()]\n        if valid_runq_links:\n            runq_section\
          \ = \"- **运行队列(RunQ)方向报告**：\" + \", \".join(f\"[报告{i+1}]({link})\" \n  \
          \                                                             for i, link\
          \ in enumerate(valid_runq_links))\n            link_sections.append(runq_section)\n\
          \    \n    if link_sections:\n        report = report.rstrip() + \"\\n\\\
          n**报告链接**\\n\" + \"\\n\".join(link_sections)\n    \n    return report"
        code_language: python3
