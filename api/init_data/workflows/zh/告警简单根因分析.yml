    - data:
        code: "import json\nfrom collections import defaultdict\n\ndef main(data_json):\n\
          \    \"\"\"\n    分析 RTT 异常数据，并给出潜在问题归因。\n    分为自身问题和下游问题两大类，下游问题细分为节点异常和实例异常。\n\
          \    在\"高集中度下游节点问题\"的结论中，会额外列出其他非主要节点的异常实例。\n    每个异常实例的信息中会包含其异常均值和单位。\n\
          \n    Args:\n        data_json (str): 包含 RTT 异常数据的 JSON 字符串。\n         \
          \               预期格式为一个列表，每个元素代表一个异常的源-目标 RTT 对。\n\n    Returns:\n     \
          \   dict: 包含分析结果的字典，格式为：\n        {\n            \"result\": str,  # 分析结论文本\n\
          \            \"direction_summary\": str,  # 异常方向总结：自身问题/下游节点问题/下游实例问题\n\
          \            \"abnormal_downstream_instances\": list  # 异常下游实例列表，仅在方向为下游实例问题时返回\n\
          \        }\n    \"\"\"\n    data = json.loads(data_json)\n\n    if not data:\n\
          \        return {\n            \"result\": \"未检测到 RTT 异常数据。\",\n       \
          \     \"direction_summary\": \"未明确归因\",\n            \"abnormal_downstream_instances\"\
          : \"[]\"\n        }\n\n    first_instance_labels = data[0].get('labels',\
          \ {})\n    src_pod = first_instance_labels.get('src_pod')\n    src_node\
          \ = first_instance_labels.get('src_node')\n    src_ip = first_instance_labels.get('src_ip')\n\
          \n    # abnormal_destinations_by_node 存储每个dst_node下所有异常pod和ip，以及它们的RTT详情\n\
          \    # 为了去重，我们将details存储为一个字典，键是dst_pod\n    abnormal_destinations_by_node\
          \ = defaultdict(lambda: {'pods': set(), 'ips': set(), 'details': {}})\n\
          \    \n    # dst_node_abnormal_pod_counts 统计每个dst_node下有多少个异常的dst_pod（用于集中度判断）\n\
          \    dst_node_abnormal_pod_counts = defaultdict(int) \n\n    # 存储所有已处理的\
          \ dst_pod，用于去重\n    processed_dst_pods = set()\n    total_abnormal_dest_pairs\
          \ = 0 # 统计 src_pod 异常的目标对数量 (src_pod -> dst_pod)\n\n    # 存储所有异常实例的详细信息，用于后续返回\n\
          \    all_abnormal_instances = []\n    \n    # 修改数据处理循环以支持去重\n    for item\
          \ in data:\n        labels = item.get('labels', {})\n        current_dst_pod\
          \ = labels.get('dst_pod')\n        current_dst_node = labels.get('dst_node')\n\
          \        current_dst_ip = labels.get('dst_ip')\n        current_avg = item.get('avg')\n\
          \        current_unit = item.get('unit')\n        current_spike = item.get(\"\
          spike\")\n        \n        if current_dst_pod and current_dst_node and\
          \ current_dst_ip:\n            # 去重：如果这个 dst_pod 已经处理过，则跳过\n           \
          \ if current_dst_pod in processed_dst_pods:\n                continue\n\
          \            \n            processed_dst_pods.add(current_dst_pod)\n   \
          \         \n            total_abnormal_dest_pairs += 1\n            abnormal_destinations_by_node[current_dst_node]['pods'].add(current_dst_pod)\n\
          \            abnormal_destinations_by_node[current_dst_node]['ips'].add(current_dst_ip)\n\
          \            abnormal_destinations_by_node[current_dst_node]['details'][current_dst_pod]\
          \ = (\n                f\"{current_dst_pod} (Avg RTT: {current_avg}{current_unit},\
          \ Spike RTT{current_spike})\"\n            )\n            dst_node_abnormal_pod_counts[current_dst_node]\
          \ += 1\n            \n            # 收集所有异常实例信息\n            all_abnormal_instances.append({\n\
          \                \"instance_name\": current_dst_pod,\n                \"\
          rtt_avg\": current_avg,\n                \"rtt_unit\": current_unit,\n \
          \               \"node\": current_dst_node\n            })\n\n    num_distinct_abnormal_dst_nodes\
          \ = len(abnormal_destinations_by_node)\n    \n    conclusion = []\n    direction_summary\
          \ = \"\"\n    abnormal_downstream_instances = []\n\n    # 1. 尝试识别\"高集中度下游节点问题\"\
          \n    # 寻找是否存在一个主导的异常下游节点\n    dominant_dst_node_info = None\n    for dst_node,\
          \ count in dst_node_abnormal_pod_counts.items():\n        # 如果某个节点下的异常 pod\
          \ 数量占总异常 pod 数量的比例很高 (例如 >= 70%)\n        # 且该节点下有多个异常 pod (count > 1)\n\
          \        if total_abnormal_dest_pairs > 0 and (count / total_abnormal_dest_pairs)\
          \ >= 0.7 and count > 1: # 阈值可调\n            dominant_dst_node_info = {\n\
          \                'node': dst_node,\n                'pods_set': abnormal_destinations_by_node[dst_node]['pods'],\
          \ # Keep original set\n                'ips': abnormal_destinations_by_node[dst_node]['ips'],\n\
          \                'details': abnormal_destinations_by_node[dst_node]['details'],\
          \ # Use collected details\n                'count': count\n            }\n\
          \            break\n\n    if dominant_dst_node_info:\n        # 场景 A: 高集中度下游节点问题\n\
          \        direction_summary = \"下游节点问题\"\n        dst_node = dominant_dst_node_info['node']\n\
          \        # Use details for string representation, sort for consistent output\n\
          \        dst_pods_details_str = \", \".join(sorted(dominant_dst_node_info['details'].values()))\n\
          \        dst_ips_str = \", \".join(dominant_dst_node_info['ips'])\n    \
          \    \n        # 收集其他非主导节点的异常实例，作为可能存在的\"同时存在实例异常\"\n        other_abnormal_instances_details\
          \ = []\n        for other_node, other_info in abnormal_destinations_by_node.items():\n\
          \            if other_node != dst_node:\n                # Use details for\
          \ other nodes too\n                other_abnormal_instances_details.extend(\n\
          \                    [f\"{detail} (在节点 {other_node} 上)\" for detail in other_info['details'].values()]\n\
          \                )\n        \n        main_conclusion = (\n            f\"\
          实例 **{src_pod}** RTT 出现问题的原因是**下游问题**，主要表现为**节点异常**。\"\n            f\"\
          异常高度集中在下游节点 **{dst_node}** (**{dst_ips_str}**)，其上大量实例 (**{dst_pods_details_str}**)\
          \ 出现异常。\"\n            f\"**建议优先检查下游节点 {dst_node} ({dst_ips_str}) 的网络配置、资源使用和整体健康状况。**\"\
          \n        )\n        if other_abnormal_instances_details:\n            #\
          \ Sort for consistent output\n            main_conclusion += (\n       \
          \         f\"\\n同时，也观察到以下下游实例可能存在独立异常或受其他因素影响：**{'; '.join(sorted(other_abnormal_instances_details))}**。\"\
          \n            )\n        conclusion.append(main_conclusion)\n\n    # 2.\
          \ 如果没有明确的\"高集中度下游节点问题\"，则判断是\"自身问题\"还是\"下游实例问题\"\n    if not conclusion:\n\
          \        # 判断是否为\"自身问题\"：异常分布广泛，影响多个不同下游节点，且没有一个主导节点\n        # 阈值：如果异常下游节点数量较多\
          \ (>=3)，或者异常下游实例总数较多 (>=5)\n        # 这些阈值可以根据实际环境调整\n        if num_distinct_abnormal_dst_nodes\
          \ >= 3 or total_abnormal_dest_pairs >= 5:\n            # 场景 B: 自身问题\n  \
          \          direction_summary = \"自身问题\"\n            other_abnormal_downstreams_str\
          \ = []\n            for node, info in abnormal_destinations_by_node.items():\n\
          \                # Sort for consistent output\n                pods_details_str\
          \ = \", \".join(sorted(info['details'].values()))\n                other_abnormal_downstreams_str.append(f\"\
          节点 {node} (实例: {pods_details_str})\")\n            \n            conclusion.append(\n\
          \                f\"实例 **{src_pod}** RTT 出现问题的原因很可能是**自身问题**。\"\n      \
          \          f\"与多个不同下游 ({'; '.join(other_abnormal_downstreams_str)}) 的 RTT\
          \ 均出现问题，且异常分布较广，不集中在特定下游节点。\"\n                f\"**建议检查 {src_node} ({src_ip})\
          \ {src_pod} 的网络配置、资源使用（CPU/内存/网络IO）和自身服务运行状态。**\"\n            )\n     \
          \   else:\n            # 场景 C: 下游实例问题 (没有主导节点，且异常数量相对较少，指向特定实例)\n      \
          \      # 这包括了单个实例异常和少数几个实例异常的情况\n            direction_summary = \"下游实例问题\"\
          \n            \n            # 构建异常下游实例列表\n            for instance in all_abnormal_instances:\n\
          \                abnormal_downstream_instances.append({\n              \
          \      \"instance_name\": instance[\"instance_name\"],\n               \
          \     \"rtt_avg\": f\"{instance['rtt_avg']}{instance['rtt_unit']}\"\n  \
          \              })\n            \n            abnormal_instances_list = []\n\
          \            for node, info in abnormal_destinations_by_node.items():\n\
          \                # Add details for each instance\n                abnormal_instances_list.extend(\n\
          \                    [f\"{detail} (在节点 {node} 上)\" for detail in info['details'].values()]\n\
          \                )\n            \n            # Sort for consistent output\n\
          \            abnormal_instances_list = sorted(abnormal_instances_list)\n\
          \n            if len(abnormal_instances_list) == 1:\n                conclusion.append(\n\
          \                    f\"实例 **{src_pod}** RTT 出现问题的原因是**下游问题**，表现为**实例异常**。\"\
          \n                    f\"仅与特定下游实例 **{abnormal_instances_list[0]}** RTT 出现异常。\"\
          \n                    f\"**建议检查该实例的健康状况。**\"\n                )\n      \
          \      else:\n                conclusion.append(\n                    f\"\
          实例 **{src_pod}** RTT 出现问题的原因是**下游问题**，表现为**实例异常**。\"\n                 \
          \   f\"与以下特定下游实例 RTT 出现异常：**{', '.join(abnormal_instances_list)}**。\"\n\
          \                    f\"**建议检查这些特定实例的健康状况。**\"\n                )\n    \
          \        \n    if not conclusion:\n        direction_summary = \"未明确归因\"\
          \n        abnormal_details_str_list = []\n        for dst_node, info in\
          \ abnormal_destinations_by_node.items():\n            # Use details for\
          \ inconsistent output\n            pods_details_str = \", \".join(sorted(info['details'].values()))\n\
          \            ips_str = \", \".join(info['ips'])\n            abnormal_details_str_list.append(f\"\
          下游节点 {dst_node} (IP: {ips_str}) 的实例: {pods_details_str}\")\n\n        conclusion.append(\n\
          \            f\"实例 {src_pod} RTT 出现异常，但无法明确归因于单一原因。\"\n            f\"共检测到与\
          \ {total_abnormal_dest_pairs} 个下游目标实例的 RTT 异常，涉及 {num_distinct_abnormal_dst_nodes}\
          \ 个不同的下游节点。\"\n            f\"具体异常下游：{'; '.join(sorted(abnormal_details_str_list))}。\"\
          \ # Sort for consistent output\n            f\"**建议深入分析 {src_pod} 和上述下游目标的网络路径及各自的资源使用情况。**\"\
          \n        )\n\n    return {\n        \"result\": \"\\n\".join(conclusion),\n\
          \        \"direction_summary\": direction_summary,\n        \"abnormal_downstream_instances\"\
          : json.dumps(abnormal_downstream_instances) if direction_summary == \"下游实例问题\"\
          \ else \"[]\"\n    }"
        code_language: python3
        desc: ''
