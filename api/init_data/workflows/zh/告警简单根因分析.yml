    - data:
        code: "import json\n\ndef main(data_json):\n    try:\n        data = json.loads(data_json).get(\"\
          data\", [])\n    except json.JSONDecodeError:\n        return {\"p90_value_us\"\
          : 200000}\n\n    response_time_data = None\n    for item in data:\n    \
          \    if item.get(\"title\") == \"Response Time\" or item.get(\"title\")\
          \ == \"吞吐量\":\n            response_time_data = item\n            break\n\
          \            \n    if not response_time_data:\n        return {\"p90_value_us\"\
          : 200000}\n\n    timeseries = response_time_data.get(\"timeseries\", [])\n\
          \    if not timeseries:\n        return {\"p90_value_us\": 200000}\n\n \
          \   chart_data = timeseries[0].get(\"chart\", {}).get(\"chartData\", {})\n\
          \    values = list(chart_data.values())\n    \n    if not values:\n    \
          \    return {\"p90_value_us\": 200000}\n\n    values.sort()\n    n = len(values)\n\
          \    index = (n - 1) * 0.9\n    \n    if index.is_integer():\n        p90_value\
          \ = values[int(index)]\n    else:\n        lower_index = int(index)\n  \
          \      upper_index = lower_index + 1\n        fraction = index - lower_index\n\
          \        p90_value = values[lower_index] * (1 - fraction) + values[upper_index]\
          \ * fraction\n        \n    unit = response_time_data.get(\"unit\", \"\"\
          ).lower().strip()\n\n    if unit == \"ms\":\n        p90_value_us = p90_value\
          \ * 1000\n    elif unit == \"s\":\n        p90_value_us = p90_value * 1000000\n\
          \    elif unit == \"us\":\n        p90_value_us = p90_value\n    else:\n\
          \        return {\"p90_value_us\": 200000}\n\n    p90_value_us = round(p90_value_us)\n\
          \n    return {\"p90_value_us\": p90_value_us}"
        code_language: python3
        desc: ''
        outputs:
          p90_value_us:
            children: null
            type: number
