    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        isInIteration: true
        iteration_id: '1741497176064'
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: cd35fff4-a037-4e72-af99-2ff8299fc5d2
          role: system
          text: 你是可观测性领域的智能助手，协助用户分析解决问题。
        - id: 2b2ad468-efcd-4bcc-aeb9-d53d2f2770ad
          role: user
          text: "# 分析目标\n基于跨资源类别的异常线程数据，判断应用实例{{#17430589567120.pod#}}是否受告警事件{{#1742807803325.alertName#}}影响，并进行初步根因定位。\n\
            \n# 输入数据规范\n- **分资源类别数据**：线程延迟及关联的北极星指标（如网络类延迟加上对应的异常网络往返延迟数据总结,不要忽略网络往返延迟数据总结）。\n\
            - **异常数据点计数**：延迟超过同类型线程历史均值20%的实例数，需标注线程延迟均值。\n\n# 分析规则（优先级从高到低）\n1. **主异常方向判定**\n\
            - 标注异常线程的延迟均值。\n- 对比各方向上平均线程耗时时间, 耗时数量级最大的作为为主要异常方向（如某个方向耗时延迟为秒级，其它方向为毫秒级）\n\
            - **线程数量优先**：若某资源类型（如网络/epoll）的异常线程数量最多，则归因至该类别。请仔细分析各方向异常线程数量。\n*示例：网络+epoll类异常线程4条\
            \ vs CPU类2条 → 归因为网络/Epoll延迟(需要结合网络往返延迟给出下一步方向)*\n\n2. **误判规避**\n- 优先考虑平均延时最高的方向，不要误判！！\n\
            \n- 若CPU或运行队列（RunQ）延迟突增且无并发网络/epoll异常，优先归因为CPU资源争用。\n\n3. **故障方向优先级（降序）**\n\
            'CPU > 网络 > Epoll > 文件 > RunQ'\n\n# 根因归因与建议\n- **CPU延迟突增**：根因为CPU方向，建议如检查代码过度嵌套问题，确认后执行版本回滚。\n\
            - **CPU抢占过高**：根因为CPU抢占，建议如排查同节点进程的资源争用。\n- **网络/Epoll延迟**：需要给出进一步方向，根据网络往返总结，若网络往返延迟异常，比如自身网络有问题，与多个不同下游节点ping延迟升高\
            \ → 根因为网络质量问题;若网络往返延迟正常，比如没有异常网络连接或者下游网络有问题 → 根因为xx（如果总结中明确指出下游）下游依赖问题。\n\
            - **文件操作延迟升高**：根因为磁盘读写问题，建议如检查文件句柄是否打开过多，是否读取大文件。\n- **RunQ延迟徒增**：根因为CPU抢占。\n\
            - 只能给出一个问题方向，不要出现xx和xx方向问题，只能说明主要问题。\n\n# 输出格式\n**应用实例**:{{#17430589567120.pod#}}\
            \  \n**北极星指标趋势摘要**\n- 按指标维度描述显著变化，如xxx个线程xxxxx,若无异常标注\"未观测到显著偏离\"。\n-\
            \ 描述网络往返延迟质量：网络往返延迟状况总结和出现异常的网络往返延迟的均值和峰值。\n\n**初步根因结论**\n- 明确告警事件对应用的影响状态。\n\
            - 基于北极星指标与分析规则输出单一归因结论。\n- 若网络/Epoll类异常但网络往返延迟正常，归因为下游依赖问题。\n\n# 输入数据\n\
            -cpu：{{#17443388433580.result#}}  \n- net：{{#17443388438160.result#}}\
            \  \n- file：{{#17443388421360.result#}}  \n- epoll：{{#1744290470304.result#}}\
            \  \n- RunQ：{{#17443388443000.result#}}\n- 网络往返延迟数据总结：{{#1754298166852.result#}}\n\
            \n# 输出准则\n- 使用简洁的非技术表述，避免歧义，如：RunQ为cpu抢占， RTT为网络往返延迟。\n- 结论需聚焦可执行建议（如\"\
            检查代码嵌套\"而非\"可能存在性能问题\"）。"
        selected: false
        title: llm analysis root cause
