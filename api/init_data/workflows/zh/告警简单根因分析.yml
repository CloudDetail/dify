        prompt_template:
        - id: c77a6a17-bbbb-4880-8b2a-56a7fcbb419e
          role: system
          text: 你是一个可观测性领域的智能助手，帮助用户解决问题
        - id: a7ee2369-e05a-4e41-b423-78b3c05e03b9
          role: user
          text: '# 目的

            根据实例线程在各方向的消耗延时告警总结和影响当前实例的下游实服务/实例，总结告警事件的产生原因。

            # 数据

            当前实例{{#1742807803325.pod#}}

            告警总结{{#17430596469370.text#}}

            下游{{#1754375770920.output#}}

            告警事件{{#1742807803325.alertName#}}

            # 背景

            根据实例线程在各方向上的时间消耗，已知当前告警根因为网络方向，且根据网络Ping质量数据得知主要延时是由下游依赖产生。所以根据告警总结和影响当前实例的下游实例再次做一个告警分析总结。

            # 总结思路

            1. 保留原总结中的各方向异常线程的描述、根因推导分析流程和根因方向总结，在此基础上为网络方向总结添加下游依赖详情描述。

            2. 添加下游实例对当前实例产生告警的描述，如：”当前实例产生xx告警，初步推断为下游xxx实例/服务引起。“如果没有告警报告链接或者告警，则不需要描述相关的内容，如果有detail信息则添加对调用接口或者调用数据查询语句的具体描述。

            3. 细化报告根因问题，如“下游依赖问题”改为“xxx下游依赖问题”xx为具体下游服务。

            # 输出

            输出你的总结，逻辑清晰，语句简洁，避免过于专业用词。

            '
