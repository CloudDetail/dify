          data\", {})\n    spans = data.get(\"data\", [])\n    client_spans = [span\
          \ for span in spans if span.get(\"spanKind\") == \"client\"]\n    sorted_client_spans_desc\
          \ = sorted(client_spans, key=lambda x: x.get(\"duration\", 0), reverse=True)\n\
          \n    data[\"data\"] = sorted_client_spans_desc[:10]\n    return {\n   \
          \     \"result\": json.dumps(data)\n    }"
