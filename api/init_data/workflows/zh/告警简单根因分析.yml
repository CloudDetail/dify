    - data:
        code: "import json\n\ndef format_number(num):\n    return \"{:,}\".format(num)\n\
          \ndef json_to_markdown(data, analysis_type):\n    markdown = [\n       \
          \ f\"# {analysis_type} Consumption Analysis Report\\n\",\n        \"## Executive\
