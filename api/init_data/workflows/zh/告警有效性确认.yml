    - data:
        code: "import json\n\ndef main(history: str, current: str, rate_threshold:\
          \ float = 0.8, num_threshold: int = 2) -> dict:\n    history_count = json.loads(history).get('data',\
          \ 0)\n    current_count = json.loads(current).get('data', 0)\n    if history_count\
          \ == 0:\n        return {\n            \"conclusion\": \"历史线程数为0，无法判断\"\
          ,\n            \"valid\": \"false\"\n        }\n\n    rate = current_count\
          \ / history_count\n    diff = history_count - current_count\n\n    if rate\
          \ < rate_threshold and diff > num_threshold:\n        return {\n       \
          \     \"conclusion\": (\n                f\"⚠️ 当前线程数 {current_count} 低于历史平均值\
          \ {history_count}，\"\n                f\"比例 {rate:.2f} < 阈值 {rate_threshold:.2f}\
          \ 且差值 {diff} > 阈值 {num_threshold}，判定线程有消失\"\n            ),\n          \
          \  \"valid\": \"false\"\n        }\n    else:\n        return {\n      \
          \      \"conclusion\": (\n                f\"✅ 当前线程数 {current_count} 与历史平均值\
          \ {history_count} 差异在允许范围内，\"\n                f\"比例 {rate:.2f}，差值 {diff}，未检测到异常\"\
          \n            ),\n            \"valid\": \"true\"\n        }"
        code_language: python3
        desc: ''
