    - data:
        code: "import requests\nimport json\n\nAPO_URL = \"http://apo-backend-svc:8080\"\
          \n\nAPO_VM = \"http://apo-victoria-metrics-single-server-svc:8428\"\n\n\
          DEBUG_OUTPUT = False\n\n\nclass Utils:\n    @staticmethod\n    def get_step(start_time:\
          \ int, end_time: int) -> dict:\n        time_diff = end_time - start_time\n\
          \n        SECOND = 1000000  # microseconds\n        MINUTE = 60 * SECOND\n\
          \        HOUR = 60 * MINUTE\n\n        step = SECOND  # default step is\
          \ 1 second\n        stepStr = \"1s\"\n        if time_diff <= 15 * MINUTE:\n\
          \            step = 30 * SECOND\n            stepStr = \"30s\"\n       \
          \ elif time_diff <= 30 * MINUTE:\n            step = 1 * MINUTE\n      \
          \      stepStr = \"1m\"\n        elif time_diff <= 1 * HOUR:\n         \
          \   step = 2 * MINUTE\n            stepStr = \"2m\"\n        elif time_diff\
          \ <= 1.5 * HOUR:\n            step = 3 * MINUTE\n            stepStr = \"\
          3m\"\n        elif time_diff <= 3 * HOUR:\n            step = 6 * MINUTE\n\
          \            stepStr = \"6m\"\n        elif time_diff <= 6 * HOUR:\n   \
          \         step = 12 * MINUTE\n            stepStr = \"12m\"\n        elif\
          \ time_diff <= 12 * HOUR:\n            step = 24 * MINUTE\n            stepStr\
          \ = \"24m\"\n        elif time_diff <= 15 * HOUR:\n            step = 30\
          \ * MINUTE\n            stepStr = \"30m\"\n        elif time_diff <= 30\
          \ * HOUR:\n            step = 1 * HOUR\n            stepStr = \"1h\"\n \
          \       else:\n            step = ((time_diff + 30 * SECOND - 1) // (30\
          \ * SECOND)) * SECOND\n            custom = (time_diff + 30 * SECOND - 1)\
          \ // (30 * SECOND)\n            stepStr = f\"{custom}s\"\n\n        return\
          \ {\n            \"step\": step,\n            \"stepStr\": stepStr,\n  \
          \      }\n\n    @staticmethod\n    def get_avg(data_json) -> dict:\n   \
          \     results = data_json[\"data\"][\"result\"]\n\n        stats = {}\n\n\
          \        for entry in results:\n            tid_key = entry[\"metric\"][\"\
          tid_key\"]\n            values = [float(value[1]) for value in entry[\"\
          values\"]]\n\n            stats[tid_key] = {\n                \"avg\": sum(values)\
          \ / len(values),\n            }\n\n        return stats\n\n    @staticmethod\n\
          \    def extract_values(thread_data: dict):\n        return [float(item[1])\
          \ for item in thread_data[\"values\"]]\n\n    @staticmethod\n    def extract_rtt_values(rtt_data):\n\
          \        \"\"\"从RTT数据中提取时间戳和值\"\"\"\n        chart_data = rtt_data[\"chart\"\
          ][\"chartData\"]\n        return list(chart_data.values())\n\n    @staticmethod\n\
          \    def net_rtt_trend_analysis(current_metrics: dict, pid: str) -> dict:\n\
          \        rtt_threshold = 0.05\n        majority_point_threshold = 0.5\n\n\
          \        num_rtt_sets = len(current_metrics[\"result\"][\"timeseries\"])\n\
          \        anomalous_rtt_sets = 0\n        rtt_details = {}\n\n        for\
          \ item in current_metrics[\"result\"][\"timeseries\"] or []:\n         \
          \   if item[\"labels\"][\"pid\"] != pid:\n                continue\n   \
          \         legend = item[\"legend\"]\n            points = Utils.extract_rtt_values(item)\n\
          \            num_points = len(points)\n\n            # 统计高于阈值的点数\n     \
          \       exceed_count = sum(1 for p in points if p > rtt_threshold)\n   \
          \         exceed_ratio = exceed_count / num_points  # 超过阈值的比例\n\n      \
          \      # 判断是否“大多数情况”异常\n            is_anomaly = exceed_ratio >= majority_point_threshold\n\
          \            if is_anomaly:\n                anomalous_rtt_sets += 1\n\n\
          \            rtt_details[legend] = {\n                \"points\": points,\n\
          \                \"exceed_count\": exceed_count,\n                \"exceed_ratio\"\
          : exceed_ratio,\n                \"is_anomaly\": is_anomaly,\n         \
          \   }\n\n        # 判断大部分RTT数据集是否异常\n        anomaly_ratio = anomalous_rtt_sets\
          \ / num_rtt_sets if num_rtt_sets > 0 else 0\n        is_majority_anomalous\
          \ = False\n        if anomalous_rtt_sets != 0:\n            is_majority_anomalous\
          \ = True\n\n        result = {\n            \"total\": num_rtt_sets,\n \
          \           \"anomalous\": anomalous_rtt_sets,\n            \"anomaly_ratio\"\
          : anomaly_ratio,\n            \"details\": rtt_details,\n        }\n   \
          \     return {\"abnormal\": is_majority_anomalous, \"result\": result}\n\
          \n    @staticmethod\n    def thread_polaris_trend_analysis(current_metrics:\
          \ dict, avg_metrics: dict) -> dict:\n        exceed_threshold = 20\n   \
          \     majority_point_threshold = 0.5\n        majority_thread_threshold\
          \ = 0.4\n\n        thread_details = {}\n        anomalous_threads = 0\n\
          \        num_threads = len(current_metrics[\"data\"][\"result\"])\n\n  \
          \      for item in current_metrics[\"data\"][\"result\"] or []:\n      \
          \      tid_key = item[\"metric\"][\"tid_key\"]\n            points = Utils.extract_values(item)\n\
          \            num_points = len(points)\n            avg = avg_metrics.get(tid_key,\
          \ {}).get(\"avg\", 0)\n            # 计算每个点相对于历史均值的百分比变化\n            if\
          \ avg != 0:\n                percent_changes = [(p - avg) / avg * 100 for\
          \ p in points]\n            else:\n                percent_changes = [float(\"\
          inf\") for _ in range(num_points)]\n\n            # 统计高于均值且超过exceed_threshold的点数\n\
          \            exceed_count = sum(1 for pc in percent_changes if pc > exceed_threshold)\n\
          \            exceed_ratio = exceed_count / num_points  # 超过阈值的比例\n\n   \
          \         # 判断是否“大多数情况”异常升高\n            is_anomaly_increase = exceed_ratio\
          \ >= majority_point_threshold\n            if avg == 0:\n              \
          \  is_anomaly_increase = False\n            if is_anomaly_increase:\n  \
          \              anomalous_threads += 1\n\n            thread_details[tid_key]\
          \ = {\n                \"points\": points,\n                \"historical_avg\"\
          : avg,\n                \"exceed_count\": exceed_count,\n              \
          \  \"exceed_ratio\": exceed_ratio,\n                \"percent_changes\"\
          : percent_changes,\n                \"is_anomaly\": is_anomaly_increase,\n\
          \            }\n        \n        if num_threads == 0:\n            anomaly_ratio\
          \ = 0\n        else:\n            anomaly_ratio = anomalous_threads / num_threads\n\
          \n        is_majority_anomalous = anomaly_ratio >= majority_thread_threshold\n\
          \n        result = {\n            \"total\": num_threads,\n            \"\
          anomalous\": anomalous_threads,\n            \"anomaly_ratio\": anomaly_ratio,\n\
          \            \"details\": thread_details,\n        }\n\n        return {\n\
          \            \"abnormal\": is_majority_anomalous,\n            \"result\"\
          : result,\n        }\n\n    @staticmethod\n    def display_polaris_trend_analysis(analysis_dit:\
          \ dict, type: str) -> str:\n        is_majority_anomalous = analysis_dit.get(\"\
          abnormal\", False)\n        result = analysis_dit.get(\"result\", {})\n\
          \        output = []\n        output.append(f\"\\n{type}线程耗时异常升高分析:\")\n\
          \        output.append(f\"大部分线程异常升高: {is_majority_anomalous}\")\n      \
          \  output.append(\n            f\"异常线程比例: {result['anomaly_ratio']:.2%}\
          \ ({result['anomalous']}/{result['total']})\"\n        )\n        if not\
          \ is_majority_anomalous:\n            return \"\\n\".join(output)\n    \
          \    for thread_id, details in result[\"details\"].items():\n          \
          \  if details[\"historical_avg\"] == 0:\n                continue\n    \
          \        output.append(\n                f\"{thread_id}: 历史均值={details.get('historical_avg',\
          \ 0):.2f}, \"\n                f\"超过历史均值20%的点数={details['exceed_count']}/{len(details['points'])}\
          \ ({details['exceed_ratio']:.2%}), \"\n                f\"是否异常升高={details['is_anomaly']}\"\
          \n            )\n\n        return \"\\n\".join(output)\n\n    @staticmethod\n\
          \    def display_rtt_trend_analysis(analysis_dit: dict, type: str) -> str:\n\
          \        is_majority_anomalous = analysis_dit.get(\"abnormal\", False)\n\
          \        result = analysis_dit.get(\"result\", {})\n        output = []\n\
          \        output.append(f\"\\n{type}异常分析:\")\n        output.append(f\"是否存在异常网络RTT:\
          \ {is_majority_anomalous}\")\n        if not is_majority_anomalous:\n  \
          \          output.append(\"所有对外网络RTT均为正常范围（低于50ms）\")\n            return\
          \ \"\\n\".join(output)\n        for thread_id, details in result[\"details\"\
          ].items():\n            output.append(\n                f\"{thread_id}:\
          \ RTT阈值=50ms, \"\n                f\"超过阈值的点数={details['exceed_count']}/{len(details['points'])}\
          \ ({details['exceed_ratio']:.2%}), \"\n                f\"是否异常升高={details['is_anomaly']}\"\
          \n            )\n\n        return \"\\n\".join(output)\n\n\ndef get_pod_info(arg:\
          \ dict) -> list:\n    timeseries = arg[\"result\"][\"timeseries\"]\n\n \
          \   seen = set()\n    pod_info = []\n\n    for item in timeseries:\n   \
          \     labels = item[\"labels\"]\n        namespace = labels.get(\"namespace\"\
          , \"\")\n        pod = labels.get(\"pod\", \"\")\n        pid = labels.get(\"\
          pid\", \"\")\n\n        if pid == \"1\" or pod == \"\":\n            continue\n\
          \        unique_key = (namespace, pod, pid)\n\n        if unique_key not\
          \ in seen:\n            seen.add(unique_key)\n            info = {\"namespace\"\
          : namespace, \"pod\": pod, \"pid\": pid}\n            pod_info.append(info)\n\
          \    return pod_info\n\n\ndef get_service_instances(start: int, end: int,\
          \ service: str):\n    params = {\n        \"metricName\": \"Originx 北极星指标\
          \ (服务层级) - 北极星指标 - 列出指定服务的所有实例\",\n        \"params\": {\n            \"\
          service_name\": service,\n        },\n        \"startTime\": start,\n  \
          \      \"endTime\": end,\n        \"step\": Utils.get_step(start, end).get(\"\
          step\"),\n    }\n    resp = requests.post(f\"{APO_URL}/api/metric/query\"\
          , json=params)\n    return get_pod_info(resp.json())\n\n\ndef get_pod_rtt(start:\
          \ int, end: int, namespace: str, pod: str):\n    params = {\n        \"\
          metricName\": \"基础设施情况 - 容器网络 - 与下游服务RTT\",\n        \"params\": {\"pod\"\
          : pod, \"namespace\": namespace},\n        \"startTime\": start,\n     \
          \   \"endTime\": end,\n        \"step\": Utils.get_step(start, end).get(\"\
          step\"),\n    }\n    resp = requests.post(f\"{APO_URL}/api/metric/query\"\
          , json=params)\n    return resp.json()\n\n\ndef get_thread_metrics(start:\
          \ int, end: int, namespace: str, pod: str, type: str):\n    query = (\n\
          \        'increase(originx_thread_polaris_nanoseconds_sum{pod=\"'\n    \
          \    + pod\n        + '\", type=\"'\n        + type\n        + '\"}[1m])'\n\
          \    )\n\n    res = requests.get(\n        APO_VM + \"/prometheus/api/v1/query_range\"\
          ,\n        params={\n            \"query\": query,\n            \"start\"\
          : start / 1000,\n            \"end\": end / 1000,\n            \"step\"\
          : Utils.get_step(start, end).get(\"stepStr\"),\n        },\n    )\n    return\
          \ res.json()\n\n\ndef polaris_trend_analysis(\n    start: int, end: int,\
          \ namespace: str, pod: str, type: str\n) -> dict:\n    hour = 3600 * 1000000\n\
          \    current = get_thread_metrics(\n        start,\n        end,\n     \
          \   namespace,\n        pod,\n        type,\n    )\n    avg = Utils.get_avg(\n\
          \        get_thread_metrics(\n            start - hour,\n            start,\n\
          \            namespace,\n            pod,\n            type,\n        )\n\
          \    )\n    result = Utils.thread_polaris_trend_analysis(current, avg)\n\
          \    check = result.get(\"abnormal\", False)\n    conclusion = Utils.display_polaris_trend_analysis(result,\
          \ type)\n    return {\n        \"abnormal\": check,\n        \"conclusion\"\
          : conclusion,\n    }\n\n\ndef net_rtt_trend_analysis(\n    start: int, end:\
          \ int, namespace: str, pod: str, pid: str\n) -> dict:\n    rtt = get_pod_rtt(\n\
          \        start,\n        end,\n        namespace,\n        pod,\n    )\n\
          \    res = Utils.net_rtt_trend_analysis(rtt, pid)\n    check = res.get(\"\
          abnormal\", False)\n    conclusion = Utils.display_rtt_trend_analysis(res,\
          \ \"rtt\")\n    return {\n        \"abnormal\": check,\n        \"conclusion\"\
          : conclusion,\n    }\n\n\ndef check_dependency(start: int, end: int, namespace:\
          \ str, pod: str) -> dict:\n    \"\"\"\n    net, epoll\n    \"\"\"\n    net_check\
          \ = polaris_trend_analysis(start, end, namespace, pod, \"net\")\n    epoll_check\
          \ = polaris_trend_analysis(start, end, namespace, pod, \"epoll\")\n    return\
          \ {\n        \"abnormal\": net_check.get(\"abnormal\", False)\n        or\
          \ epoll_check.get(\"abnormal\", False),\n        \"conclusion\": net_check.get(\"\
          conclusion\", \"\")\n        + epoll_check.get(\"conclusion\", \"\"),\n\
          \    }\n\n\ndef check_self_infra(start: int, end: int, namespace: str, pod:\
          \ str, pid: str):\n    \"\"\"\n    cpu, runq, rtt\n    \"\"\"\n    cpu_check\
          \ = polaris_trend_analysis(start, end, namespace, pod, \"cpu\")\n    runq_check\
          \ = polaris_trend_analysis(start, end, namespace, pod, \"runq\")\n    rtt_check\
          \ = net_rtt_trend_analysis(start, end, namespace, pod, pid)\n    return\
          \ {\n        \"abnormal\": cpu_check.get(\"abnormal\", False)\n        or\
          \ runq_check.get(\"abnormal\", False)\n        or rtt_check.get(\"abnormal\"\
          , False),\n        \"conclusion\": cpu_check.get(\"conclusion\", \"\")\n\
          \        + runq_check.get(\"conclusion\", \"\")\n        + rtt_check.get(\"\
          conclusion\", \"\"),\n    }\n\n\ndef analyze_instance(start: int, end: int,\
          \ namespace: str, pod: str, pid: str) -> dict:\n    dep_check = check_dependency(\n\
          \        start,\n        end,\n        namespace,\n        pod,\n    )\n\
          \    output = \"\"\n    check = True\n    if not dep_check.get(\"abnormal\"\
          , False):\n        output += \"\\n结论：对外调用耗时正常，是自身问题, 不可以忽略\"\n        return\
          \ {\n        \"abnormal\": False,\n        \"conclusion\": dep_check.get(\"\
          conclusion\", \"\")\n        + output,\n        }\n\n    infra_check = check_self_infra(\n\
          \        start,\n        end,\n        namespace,\n        pod,\n      \
          \  pid,\n    )\n    check \n    if infra_check.get(\"abnormal\", False):\n\
          \        output += \"\\n结论：对外调用耗时异常，同时应用程序自身耗时也异常, 告警不可忽略\"\n        check\
          \ = False\n    else:\n        output += \"\\n结论：对外调用耗时异常，但是自身应用正常，可以忽略该告警\"\
          \n        check = True\n\n    return {\n        \"abnormal\": check,\n \
          \       \"conclusion\": dep_check.get(\"conclusion\", \"\")\n        + infra_check.get(\"\
          conclusion\", \"\")\n        + output,\n    }\n\n\n\n\n\ndef main(service:\
          \ str, start: int, end: int) -> dict:\n    items = get_service_instances(\n\
          \        start, end, service\n    )\n\n    vaild = \"true\"\n\n    output\
          \ = []\n    for item in items:\n        res = analyze_instance(\n      \
          \      start,\n            end,\n            item[\"namespace\"],\n    \
          \        item[\"pod\"],\n            item[\"pid\"],\n        )\n       \
          \ con = res.get(\"conclusion\", \"\")\n        if res.get(\"abnormal\",\
          \ False) is False:\n            vaild = \"false\"\n        pod = item['pod']\n\
          \        output.append(f'\\n{pod}{con}')\n    \n    return {\n        \"\
          abnormal\": str(vaild),\n        \"conclusion\": \"\\n\".join(output),\n\
          \    }"
