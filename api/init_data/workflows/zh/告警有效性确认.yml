    - data:
        code: "import re\n\ndef main(alert_name: str) -> str:\n    alert_name = alert_name.lower()\n\
          \n    rules = [\n        (r\"cpu.*throttled|容器cpu.*throttled\", \"容器高cpu_cfs_throttled\"\
          ),\n        (r\"latency.*yest|del.*yest|延迟.*升高|延时.*升高|请求.*延时|请求.*延迟\", \"\
          平均请求延迟升高\"),\n        (r\"cont.*cpu.*usage|容器.*cpu.*率\", \"容器cpu使用率\"),\n\
          \        (r\"req.*err.*rate|请求.*错误.*率\", \"请求错误率\"),\n        (r\"cont.*memory|容器.*内存.*用\"\
          , \"容器内存使用率\"),\n        (r\"hots.*mem.*use|主机.*内存.*用\", \"主机内存使用率\"),\n\
          \        (r\"net.*rtt|net.*lat|网络.*延迟|rtt\", \"网络rtt延迟\"),\n        (r\"\
          disk.*space|disk.*full|磁盘.*不足\", \"磁盘不足\"),\n        (r\"net.*thru|net.*through|网络.*吞吐\"\
          , \"异常网络入吞吐量\"),\n        (r\"disk.*write.*sp|磁盘.*写.*速\", \"异常磁盘写速度\"),\n\
          \        (r\"disk.*read.*sp|磁盘.*读.*速\", \"异常磁盘读速度\"),\n        (r\"cpu.*load|cpu.*负载\"\
          , \"cpu高负载\"),\n        (r\"disk.*io.*util|disk.*util|磁盘.*io.*用\", \"异常磁盘io利用率\"\
          ),\n        (r\"cpu.*wait|cpu.*io.*wait\", \"cpu高io wait\"),\n        (r\"\
          file.*desc|fd.*use|文件.*描述符\", \"文件描述符使用量\"),\n        (r\"cont.*kill|容器.*终止\"\
          , \"容器被kill\"),\n        (r\"log.*err|日志.*错误\", \"日志错误数相关\"),\n        (r\"\
          down.*dep.*time|down.*2.*min|下游.*依赖.*耗时|响应.*耗时\", \"下游依赖耗时超过平均值\"),\n  \
          \      (r\"进程.*不活跃|process.*inactive\", \"进程不活跃\")\n    ]\n\n    result\
          \ = \"其他\"\n    for pattern, category in rules:\n        if re.search(pattern,\
          \ alert_name):\n            result = category\n            break\n\n   \
          \ return {\n        \"result\": result\n    }\n"
