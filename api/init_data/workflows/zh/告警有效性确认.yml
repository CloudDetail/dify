    - data:
        code: "from datetime import datetime\nimport requests\n\nAPO_URL = \"http://apo-backend-svc:8080\"\
          \n\nAPO_VM = \"http://apo-victoria-metrics-single-server-svc:8428\"\n\n\
          class Utils:\n    @staticmethod\n    def get_step(start_time: int, end_time:\
          \ int) -> dict:\n        time_diff = end_time - start_time\n\n        SECOND\
          \ = 1000000  # microseconds\n        MINUTE = 60 * SECOND\n        HOUR\
          \ = 60 * MINUTE\n\n        step = SECOND  # default step is 1 second\n \
          \       stepStr = \"1s\"\n        if time_diff <= 15 * MINUTE:\n       \
          \     step = 30 * SECOND\n            stepStr = \"30s\"\n        elif time_diff\
          \ <= 30 * MINUTE:\n            step = 1 * MINUTE\n            stepStr =\
          \ \"1m\"\n        elif time_diff <= 1 * HOUR:\n            step = 2 * MINUTE\n\
          \            stepStr = \"2m\"\n        elif time_diff <= 1.5 * HOUR:\n \
          \           step = 3 * MINUTE\n            stepStr = \"3m\"\n        elif\
          \ time_diff <= 3 * HOUR:\n            step = 6 * MINUTE\n            stepStr\
          \ = \"6m\"\n        elif time_diff <= 6 * HOUR:\n            step = 12 *\
          \ MINUTE\n            stepStr = \"12m\"\n        elif time_diff <= 12 *\
          \ HOUR:\n            step = 24 * MINUTE\n            stepStr = \"24m\"\n\
          \        elif time_diff <= 15 * HOUR:\n            step = 30 * MINUTE\n\
          \            stepStr = \"30m\"\n        elif time_diff <= 30 * HOUR:\n \
          \           step = 1 * HOUR\n            stepStr = \"1h\"\n        else:\n\
          \            step = ((time_diff + 30 * SECOND - 1) // (30 * SECOND)) * SECOND\n\
          \            custom = (time_diff + 30 * SECOND - 1) // (30 * SECOND)\n \
          \           stepStr = f\"{custom}s\"\n\n        return {\n            \"\
          step\": step,\n            \"stepStr\": stepStr,\n        }\n\n\ndef get_service_latency(start:\
          \ int, end: int, service: str, endpoint: str):\n    params = {\n       \
          \ \"metricName\": \"Originx 北极星指标 (服务层级) - RED指标 - 平均响应时间\",\n        \"\
          params\": {\"service_name\": service, \"content_key\": endpoint},\n    \
          \    \"startTime\": start,\n        \"endTime\": end,\n        \"step\"\
          : Utils.get_step(start, end).get(\"step\"),\n    }\n    resp = requests.post(f\"\
          {APO_URL}/api/metric/query\", json=params)\n    return resp.json()\n\ndef\
          \ timestamp_to_readable(ts):\n    \"\"\"将微秒时间戳转换为可读格式\"\"\"\n    return\
          \ datetime.fromtimestamp(int(ts) / 1000000).strftime('%Y-%m-%d %H:%M:%S')\n\
          \ndef analyze_trend(data, time_window=15*60):\n    \"\"\"分析15分钟内的趋势\"\"\"\
          \n    points = []\n    for ts in data['result']['timeseries']:\n       \
          \ for timestamp, value in ts['chart']['chartData'].items():\n          \
          \  points.append((int(timestamp), float(value)))\n    \n    if not points:\n\
          \        return \"No data available.\"\n    \n    points.sort()  # 按时间戳排序\n\
          \    trend = []\n    current_group = []\n    prev_value = points[0][1]\n\
          \    \n    for ts, value in points:\n        if not current_group:\n   \
          \         current_group.append((ts, value))\n        elif abs(value - prev_value)\
          \ < 0.01 or (value == 0 and prev_value == 0):  # 连续相似值\n            current_group.append((ts,\
          \ value))\n        else:\n            trend.append(current_group)\n    \
          \        current_group = [(ts, value)]\n        prev_value = value\n   \
          \ \n    if current_group:\n        trend.append(current_group)\n    \n \
          \   # 生成趋势描述\n    description = []\n    for group in trend:\n        start_ts,\
          \ start_val = group[0]\n        end_ts, end_val = group[-1]\n        avg_val\
          \ = sum(v for _, v in group) / len(group)\n        \n        if avg_val\
          \ == 0:\n            description.append(\n                f\"{len(group)}个数据点({timestamp_to_readable(start_ts)}\
          \ - \"\n                f\"{timestamp_to_readable(end_ts)})值为0，完全正常\"\n\
          \            )\n        elif avg_val < 0.01:\n            description.append(\n\
          \                f\"{timestamp_to_readable(start_ts)}出现轻微波动({avg_val:.6f})\"\
          \n            )\n        elif avg_val > 0.1:\n            description.append(f\"\
          显著峰值在{timestamp_to_readable(start_ts)} - \"\n                          \
          \   f\"{timestamp_to_readable(end_ts)}期间：\")\n            for ts, val in\
          \ group:\n                description.append(f\"  {timestamp_to_readable(ts)}:\
          \ {val:.3f}\")\n        else:\n            description.append(\n       \
          \         f\"{timestamp_to_readable(start_ts)}值约为{avg_val:.6f}\"\n     \
          \       )\n    \n    return description\n\ndef analyze_history(data):\n\
          \    \"\"\"分析历史数据特征\"\"\"\n    values = []\n    for ts in data['result']['timeseries']:\n\
          \        for _, value in ts['chart']['chartData'].items():\n           \
          \ values.append(float(value))\n    \n    if not values:\n        return\
          \ \"No historical data available.\", 0\n    \n    # 统计范围和峰值\n    min_val\
          \ = min(values)\n    max_val = max(values)\n    avg_val = sum(values) /\
          \ len(values)\n    high_values = sorted([v for v in values if v > avg_val\
          \ * 1.2], reverse=True)\n    \n    description = [\n        \"历史数据显示该指标通常维持在很低的水平：\"\
          ,\n        f\"大多数值在{avg_val:.6f} - {avg_val * 1.2:.6f}之间\",\n        f\"\
          偶尔有较高值({', '.join(f'{v:.3f}' for v in high_values[:2])})但持续时间很短\"\n    ]\n\
          \    \n    return description, avg_val\n\ndef analyze_latency(past_24h,\
          \ recent_15m):\n    \"\"\"综合分析并生成报告\"\"\"\n    # 分析15分钟趋势\n    trend_desc\
          \ = analyze_trend(recent_15m)\n    \n    # 分析历史数据\n    history_desc, history_avg\
          \ = analyze_history(past_24h)\n    \n    # 获取15分钟内的数据点并排序\n    recent_values\
          \ = []\n    for ts in recent_15m['result']['timeseries']:\n        for timestamp,\
          \ value in ts['chart']['chartData'].items():\n            recent_values.append((int(timestamp),\
          \ float(value)))\n    \n    recent_values.sort()\n    if not recent_values:\n\
          \        return {\n            \"abnormal\": \"true\",\n            \"conclusion\"\
          : \"\\n\".join([\n                \"MetricsData趋势分析\",\n               \
          \ \"当前15分钟数据趋势：\",\n                \"  无数据可用\",\n                \"历史数据对比：\"\
          ,\n                *[f\"  {line}\" for line in history_desc],\n        \
          \        \"告警有效性判断：\",\n                \"  无最近数据，告警无效\",\n            \
          \    \"结论：告警无效\"\n            ]) + \"\\n\"\n        }\n    \n    # 计算加权平均值（越靠近当前时间点权重越高）\n\
          \    weights = [1 + i * 0.1 for i in range(len(recent_values))]  # 线性递增权重\n\
          \    weighted_sum = sum(v * w for (_, v), w in zip(recent_values, weights))\n\
          \    weight_total = sum(weights)\n    weighted_avg = weighted_sum / weight_total\
          \ if weight_total > 0 else 0\n    \n    # 判断趋势：波动还是升高\n    trend_type =\
          \ \"波动\"\n    if weighted_avg > history_avg * 1.2:\n        trend_type =\
          \ \"升高\"\n    \n    # 获取最后几个点和最大值\n    recent_max = max(v for _, v in recent_values)\n\
          \    last_value = recent_values[-1][1] if recent_values else 0\n    \n \
          \   # 判断告警有效性\n    valid = \"true\"\n    alert_desc = []\n    \n    # 如果最后一个点显著升高（>\
          \ 历史平均值的1.2倍），告警有效\n    if last_value > history_avg * 1.2:\n        alert_desc.append(\n\
          \            f\"最后一个数据点({timestamp_to_readable(recent_values[-1][0])}: {last_value:.3f})\"\
          \n            f\"显著高于历史平均值({history_avg:.3f})\"\n        )\n        alert_desc.append(\"\
          指标在最近时间点出现升高，表明潜在异常\")\n        alert_conclusion = \"告警有效\"\n        valid\
          \ = \"false\"\n    elif recent_max > history_avg * 1.2:\n        alert_desc.append(\n\
          \            f\"当前15分钟内最大值({recent_max:.3f})高于历史平均值({history_avg:.3f})\"\
          \n        )\n        peak_duration = sum(1 for _, v in recent_values if\
          \ v > history_avg * 1.2) * 0.5  # 假设每点0.5分钟\n        alert_desc.append(f\"\
          峰值持续时间约{peak_duration}分钟\")\n        if trend_type == \"升高\":\n        \
          \    alert_desc.append(\"指标呈现升高趋势，表明潜在异常\")\n            alert_conclusion\
          \ = \"告警有效\"\n            valid = \"false\"\n        else:\n           \
          \ alert_desc.append(\"指标呈现波动趋势，未持续升高\")\n            alert_desc.append(\"\
          指标已回落，告警无效\")\n            alert_conclusion = \"告警无效\"\n    else:\n    \
          \    alert_desc.append(\"当前15分钟内无显著异常峰值\")\n        alert_desc.append(f\"\
          指标呈现{trend_type}趋势，告警无效\")\n        alert_conclusion = \"告警无效\"\n    \n\
          \    # 组合报告\n    report = [\n        \"MetricsData趋势分析\",\n        \"当前15分钟数据趋势：\"\
          ,\n        *[f\"  {line}\" for line in trend_desc],\n        f\"  趋势类型：{trend_type}\
          \ (加权平均值: {weighted_avg:.6f})\",\n        \"\\n历史数据对比：\",\n        *[f\"\
          \  {line}\" for line in history_desc],\n        \"\\n告警有效性判断：\",\n     \
          \   *[f\"  {line}\" for line in alert_desc],\n        f\"结论：{alert_conclusion}\"\
          \n    ]\n    \n    return {\n        \"abnormal\": str(valid),\n       \
          \ \"conclusion\": \"\\n\".join(report) + \"\\n\"\n    }\n\ndef main(service:\
          \ str, endpoint: str, start: int, end: int) -> dict:\n    current = get_service_latency(start,\
          \ end, service, endpoint)\n\n    hour = 3600 * 1000000\n    day = 24 * hour\n\
          \    history = get_service_latency(\n        start - day,\n        start,\n\
          \        service,\n        endpoint,\n    )\n    res = analyze_latency(history,\
          \ current)\n    return res"
