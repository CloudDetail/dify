          name: gpt-5.4
          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: fd6c6155-9b33-4e8e-880f-0f536f4f4537
          role: system
          text: 你是一个智能推理助手,你的任务是根据用户提供的数据和用户提供的规则，按照要求分析出根因节点
        - id: b48ad458-e31b-4a35-9dae-535df50f3e54
          role: user
          text: "#背景#\n    这里有一个微服务拓扑图，每层有节点名。上层节点和下层节点构成上游与下游关系，且为上游调用下游。请根据数据内容记住上下游服务关系的拓扑结构。\n\
            \    #注意#\n    拓扑数据信息\n    1.每层节点名称最前面的数字为层数,如数字0代表该节点是入口服务节点。数字越大，层数越深，同时针对非入口节点，往上找到的第一个层级比它小1的节点为其上游节点。\n\
            \    2.一个节点可能有多个下游节点，同时它还可能被多个上游节点调用，请不要遗漏任何节点\n    3.不要创造不存在的上下游调用关系，不要弄反上下游关系，也不要遗漏上下游调用关系，拓扑结构中不要出现环，不要联想到其他东西。\n\
            \    4.所有节点按照名称标识，节点名称比较长，请不要压缩任何节点名称。(节点名称中不要带有层级信息，如1──开头的信息)\n    拓扑图数据会在之后给出。\n\
            \    #输出#\n    已记住拓扑数据信息格式，回答简洁简短。"
        - id: e60ae457-5f3b-4f5b-a8dc-7ac6198a4c14
          role: assistant
          text: 已记住拓扑数据信息格式。
        - id: 8ecd0c9e-b236-461c-a711-86904171e6af
          role: user
          text: "#背景#\n    拓扑数据中每个节点后如果有告警事件，会在节点名称后面附带告警事件, 没有告警事件的节点名称后面是空的。\n \
            \   #注意#\n    告警事件为JSON格式数据，含义如下:\n    第一层的KEY为告警事件的类型,是数字，1接口层告警,2为容器异常,3为基础设施异常,4为网络程序异常,5为错误异常。\n\
            \    第二层的KEY为该类型告警数据信息，含义如下\n    - add新增告警事件数\n    - duplicate重复告警事件数\n\
            \    - resolve已经解决告警事件数\n    - keep 目前还存留告警事件数\n    - firstTime该类型告警事件第一次发生时间\n\
            \    - lastTime该类型告警事件最后一次发生时间\n    - resolveTime解决告警的时间(告警已解决才有)\n  \
            \  #处理过程#\n    请仔细处理数据,如处理每行的节点(节点名称从层数后面的--符号后开始,节点名称中不要带有层级信息，如1──开头的信息)，记录的节点名称一定要完整。回答记住数据,不用回答其他内容。\n\
            \    有告警事件的节点定义是节点出现在JSON数据中，没有告警事件的节点定义是节点未出现在JSON数据中\n    #输出#\n   \
            \ 已记住这些告警事件，回答简洁简短。\n    #拓扑图和告警事件#\n    拓扑图和告警事件数据如下\n{{#1740483937644.text#}}"
        - id: 83e3d53e-a468-49eb-a624-1c01ea0d8660
          role: assistant
          text: 已记住这些告警事件。
        - id: 321dad3d-8100-43ef-9192-83678743bfec
          role: user
          text: "#目的#\n      请根据上文提供的微服务拓扑图和每个节点的告警事件, 之后会提供以一个个规则找出符合规则的根因节点。\n \
            \     #根因节点推导流程#\n      - 根据告警事件中异常类型和发生次数，记录异常事件从下游往上游传递的顺序\n      -\
            \ 每次给出一个规则后，从上一个规则中给出的疑似根因节点中继续排除符合规则的节点，不用从头开始推导。不用附带完整数据，总结数据即可\n  \
            \    #注意#\n      在拓扑中，一个上游可能有多个下游节点，多个下游视为同级节点。如果同级节点中的服务都满足异常向上传递，那么这些下游节点都可认为是根因，且排除上游节点，不要遗漏节点。同时记得一定要排除入口节点。\n\
            \      整个过程中一定要使用节点的完整名称！！！不要省略,同时节点名称中的符号不能省略，和原始数据保持一致，节点名称不要有0──之类的层数信息。\n\
            \      #输出#\n      记住推导流程，回答简洁简短。"
        - id: 47201076-79d5-494a-b292-4abb6c7b0255
          role: assistant
          text: 已记住推导流程。
        - id: 0a47ba60-f808-4aee-baf8-6eb335075005
          role: user
          text: '{{#1740620413020.text#}}'
        selected: false
        title: LLM
        type: llm
        variables: []
        vision:
          enabled: false
      height: 89
