    - data:
        desc: 规则2
        provider_id: apo_rule
        provider_name: apo_rule
        provider_type: builtin
        selected: false
        title: 告警规则执行2
        tool_configurations: {}
        tool_label: 告警规则执行
        tool_name: alert_rule
        tool_parameters:
          rule:
            type: mixed
            value: "规则2\n      从应用接口层告警出发,沿着业务入口的拓扑结构，从上游向下游每个节点依次追踪（使用拓扑图数据，不要搞错上下游）。\
              \ 请输出推理过程\n      分析下游节点的时候一定要比较与下游节点的数字大小。\n      在追踪过程中分析每个节点： \n \
              \     如果存在接口层告警，继续向该节点前面数字到与它相同数字之间大于节点前面数字的节点追踪，\n      如果没有接口层告警，停止追踪，返回上一级节点，当前节点排除。\
              \ \n      该节点在以下情况下作为疑似根因节点：\n      1. 存在其它类型的告警\n      2. 该节点前面数字到与它相同数字之间大于节点前面数字的节点没有跟该节点相同类型的告警\n\
              \      3. 如果节点是深度最深（节点前面数字最大）的节点，同时节点存在接口告警\n      4. 在追踪过程中，对于每个有1或者5类型类型接口告警的节点：{\
              \ \n      检查是否存在出了1或者5类型类型的其他类型的告警，如果存在，则该节点是疑似根因，记录并继续分析下游节点追踪。 \n\
              \      如果不存在1或者5类型类型的其他告警，同时该节点前面数字到与它相同数字之间大于节点前面数字的节点告警没有1或者5类型类型接口告警，则该节点是疑似根因节点。\n\
              \      '注意'\n      在拓扑图中节点前面数字表示拓扑图中的深度，拓扑图中的深度与文本中节点的先后顺序没有关系，相同数字表示兄弟关系没有上下游关系\n\
              \      下游节点定义：该节点前面数字到与它相同数字之间大于节点前面数字的节点，\n      最下游节点深度定义：疑似根因节点前面数字最大的数字。\
              \ 如果疑似根因的前面数字与最下游节点深度相同，是疑似根因的优先候选。\n      '输出'\n      符合当前规则的节点列表，简洁而短，且节点名称需要完整，不可以省略"
        type: tool
      height: 81
      id: '1740620917572'
