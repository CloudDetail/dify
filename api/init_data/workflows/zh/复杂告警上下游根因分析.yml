        provider_id: apo_rule
        provider_name: apo_rule
        provider_type: builtin
        selected: false
        title: 告警规则执行3
        tool_configurations: {}
        tool_label: 告警规则执行
        tool_name: alert_rule
        tool_parameters:
          rule:
            type: mixed
            value: "规则3\n      根因节点需要满足异常从该节点开始向上游传递递，同时该类型异常告警事件是持续发生的，而不是偶发的。\n\
              \      '注意'\n      如果接口层类型的告警既有新增又有解决，且该已解决告警事件时间和告警事件第一次发生时间接近，该节点可认为是偶发。\n\
              \      但是接口层类型告警存在存留告警，该节点应做为疑似根因节点。\n      节点的异常告警是偶发，那么它不应该被认定为根因节点\n\
              \      '输出'\n      符合当前规则的节点列表，简洁而短，且节点名称需要完整，和源数据保持一致，不可以省略"
        type: tool
      height: 81
      id: '1740620994135'
      position:
        x: 1629.523646097407
