    - data:
        code: "import json\n\ndef get_metric(red_data):\n    \"\"\"\n    从 red 数据中提取并返回延迟、错误率和\
          \ TPS 指标。\n    如果数据不完整，返回 None。\n    \"\"\"\n    metrics = {}\n    \n  \
          \  if len(red_data) < 3:\n        return None\n\n    try:\n        metrics[\"\
          latency\"] = red_data[0].get(\"timeseries\", [{}])[0].get(\"chart\")\n \
          \       metrics[\"errorRate\"] = red_data[1].get(\"timeseries\", [{}])[0].get(\"\
          chart\")\n        metrics[\"tps\"] = red_data[2].get(\"timeseries\", [{}])[0].get(\"\
          chart\")\n    except (IndexError, TypeError):\n        return None\n\n \
          \   return metrics\n\ndef main(topology_str: str, services_red):\n    \"\
          \"\"\n    解析拓扑结构和 RED 数据，然后将指标添加到相应的服务节点中。\n    如果服务没有指标，则从拓扑中移除。\n    \"\
          \"\"\n    if \"Error\" in topology_str:\n        return {\n            \"\
          result\": \"{}\"\n        }\n    topology = json.loads(topology_str)\n \
          \   topology_data = topology.get(\"data\", {}) \n    \n    topology_data.pop(\"\
          rawResp\", None)\n\n    for service_red_str in services_red:\n        service_red_obj\
          \ = json.loads(service_red_str)\n        red_data = service_red_obj.get(\"\
          data\")\n        \n        if not red_data:\n            continue\n\n  \
          \      service_name = red_data[0].get(\"timeseries\", [{}])[0].get(\"labels\"\
          , {}).get(\"service\")\n        \n        if not service_name:\n       \
          \     continue\n\n        metrics = get_metric(red_data)\n        \n   \
          \     if not metrics:\n            continue\n\n        # 将 metrics 添加到对应的服务节点\n\
          \        current_service = topology_data.get(\"current\")\n        if current_service\
          \ and current_service.get(\"service\") == service_name:\n            current_service[\"\
          metrics\"] = metrics\n            continue\n        \n        for child\
          \ in topology_data.get(\"children\", []):\n            if child.get(\"service\"\
          ) == service_name:\n                child[\"metrics\"] = metrics\n     \
          \           continue\n        \n        for parent in topology_data.get(\"\
          parents\", []):\n            if parent.get(\"service\") == service_name:\n\
          \                parent[\"metrics\"] = metrics\n                continue\n\
          \    \n    topology_data[\"children\"] = [\n        child for child in topology_data.get(\"\
          children\", []) if \"metrics\" in child\n    ]\n    topology_data[\"parents\"\
          ] = [\n        parent for parent in topology_data.get(\"parents\", []) if\
          \ \"metrics\" in parent\n    ]\n\n    if \"metrics\" not in topology_data.get(\"\
          current\", {}):\n        topology_data[\"current\"] = {}\n\n    return {\n\
          \        \"result\": json.dumps(topology_data)\n    }"
        code_language: python3
