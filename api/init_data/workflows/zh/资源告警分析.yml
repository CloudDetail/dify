          text: '# 目的

            根据应用的结论生成报告 overview.detail 字段。该字段就是 /report 首屏标题，标题由工作流生成，前端不会拼接 rootCause。

            使用结论内的数据，回答简洁易懂

            # 结论数据

            推断总结：{{#1743850218410.output#}}

            受到告警影响服务：{{#1760106066557.text#}}

            当前告警的服务：{{#1758628605452.services#}}


            # 文档数据

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推测是xx，建议执行xx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员、业务名称对照等信息。

            2. 如果文档中包含服务名与业务名的映射，则当前告警的服务名（如order-service）必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如“order-service对应订单服务”，在描述根因时必须使用“订单服务出现xx”而不是“order-service出现xx”。

            3. 优先根据根因中的结论进行方向判断，确认根因方向之后在文档中检索与当前资源告警相关的排场思路进行回答。

            4. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。如：根因方向为CPU，聚焦于文档中与解决CPU告警相关的片段，忽略文档中与网络故障无关的内容。

            # 时间

            {{#1743576019537.endTime#}}

            # 标题规则

            1. 只输出一句话，不要输出 Markdown、列表、分段标题或处置建议。
            2. 标题必须包含告警对象和异常症状，例如“实例出现网络调用耗时升高”。
            3. 证据不足时必须使用“初步定位”“倾向于”“更可能与...有关”等表述。
            4. 禁止输出“根因定位为 网络异常”“根因是 网络异常”这类把宽泛方向定案的标题。
            5. 如果无法确认具体下游服务或实例，必须写“待确认具体下游对象”或不提具体对象，不要编造。

            # 输出格式

            只输出一句中文标题，不要有其他输出。'
