            ,\n            \"verificationSummary\": \"观察内存曲线和告警恢复\",\n            \"\
            level\": \"medium\"\n        }\n    ] }\n#输出格式\naction建议为中文；json格式数据，格式参考模版，内容包含排障详细步骤，至少5条建议，不要输出其他内容；不要输出Markdown代码块、解释文字或省略号"
