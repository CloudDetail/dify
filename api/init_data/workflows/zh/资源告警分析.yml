        prompt_template:
        - id: 5426b9f0-37c8-45b7-9faa-49695110dc7d
          role: system
          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: '# 目的

            根据相关指标结果，分析告警的正确性或者产生的原因并定位疑似根因容器，最后提供恰当的解决思路。


            # 分析过程

            根据相关指标数据1.异常点均值最高的实例{{#1745894017978.top_abnormal_means#}}2.异常增速均值最高的实例{{#1745894017978.top_abnormal_growths#}}，3.资源平均使使用最高的三个实例{{#1747206482765.top_three#}}分析告警产生原因。

            1. 从指标中找到相关资源使用异常的容器，指标值相对较低的容器可以忽略。按使用量提供若干个疑似根因的容器。

            2. 根据告警{{#1744959389144.alertName#}}，找出疑似根因的容器和原因。

            3. 从程序运行和程序本身的功能给出告警可能的产生原因，如：

            - CPU： 频繁GC，低效率的算法，无限循环等。

            - 内存：内存泄漏，过大的数据结构，对象生命周期过长等。

            - 网络：遭受攻击，设备资源不足，代理/VPN配置问题等。

            - 磁盘：大文件（日志）堆积，高负载读写等。

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。若不涉及容器则回复中忽略容器。格式为：告警{{#1744959389144.alertName#}}产生的根因疑似是xx容器，可能存在xx问题，推荐解决解决方案xx。

            '
