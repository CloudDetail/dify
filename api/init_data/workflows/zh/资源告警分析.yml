          text: '# 目的

            根据相关指标数据，分析告警的正确性或者产生的原因，最后提供恰当的解决思路。

            # 分析过程

            根据相关指标数据：受告警影响容器的CPU使用率{{#1752744646406.text#}}，节点上其他容器CPU使用率增速最高的实例{{#17528257033920.top_abnormal_growths#}}和均值最高的实例{{#17528257033920.top_abnormal_means#}}，告警{{#1744959389144.alertName#}}，告警容器{{#1744959389144.pod#}}。

            1. 分析受告警影响容器的CPU使用率，判断初步原因：

            - 如果处于持续高位，代表容器使用CPU达到限制，节流时间过高由于自身CPU使用过多。

            - 如果处于低位，代表可能是由于CPU争抢导致容器被限流。

            - 如果是周期性峰值（低谷非0时）或突发峰值，代表可能是由于突发流量导致的，节流原因是由于自身CPU使用过多。

            2. 分析节点上其他容器CPU使用率，识别CPU使用率最多的几个容器，如果当前容器CPU使用率远高于其他容器，则原因为自身CPU使用过多。

            3. 根据判断的初步原因，从程序运行和程序本身的功能给出告警可能的产生原因（下列方向只能给出一个）：

            - 自身CPU使用过多：总结使用量水平。

            - CPU争抢：总结争抢过多的容器有哪些。


            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，一句话描述当前告警异常状况：在xx时间段内哪些实例的线程消耗了多少CPU，时间段内的请求量为xx，并给出你推断出的疑似根因的所有容器、疑似原因。若不涉及容器则回复中忽略容器。格式为：容器xx产生告警xx的原因是：自身CPU使用过多/节点其他容器争抢导致（只能给出一个原因）。

            '
