    - data:
        code: "import json\n\n\ndef main(arg1: str) -> dict:\n    data = json.loads(arg1)\n\
          \    timeseries = data.get(\"data\", {}).get(\"timeseries\", [])\n\n   \
          \ namespaces = []\n    pods = []\n    pids = []\n    nodes = []\n\n    instances\
          \ = []\n    for entry in timeseries:\n        labels = entry.get(\"labels\"\
          , {})\n\n        namespace = labels.get(\"namespace\")\n        pod = labels.get(\"\
          pod\")\n        pid = labels.get(\"pid\")\n        node = labels.get(\"\
          node\")\n\n        instance = {\n            \"namespace\": namespace,\n\
          \            \"pod\": pod,\n            \"pid\": pid,\n            \"node\"\
          : node,\n        }\n\n        if namespace and namespace not in namespaces:\n\
          \            namespaces.append(namespace)\n\n        if pod and pod not\
          \ in pods:\n            pods.append(pod)\n\n        if pid and pid not in\
          \ pids:\n            pids.append(pid)\n\n        if node and node not in\
          \ nodes:\n            nodes.append(node)\n\n        if not instance[\"pod\"\
          ] and not instance[\"node\"] and not instance[\"pid\"]:\n            continue\n\
          \n        if instance not in instances and len(instances) < 30:\n      \
          \      instances.append(instance)\n\n    output = {\"namespaces\": namespaces,\
          \ \"pods\": pods, \"pids\": pids}\n    return {\"result\": json.dumps(output),\
          \ \"instances\": instances}"
        code_language: python3
        desc: ''
        outputs:
          instances:
            children: null
            type: array[object]
          result:
            children: null
            type: string
        selected: false
        title: 获取所有pod和namespace组合
        type: code
        variables:
        - value_selector:
          - '1743652485397'
          - text
          variable: arg1
