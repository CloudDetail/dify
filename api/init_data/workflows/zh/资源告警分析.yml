    - data:
        code: "import json\n\ndef main(data_json):\n    data = json.loads(data_json)\n\
          \    timeseries = data.get('data', {}).get('timeseries', [])\n    unit =\
          \ data.get('unit', '')\n    filtered = []\n\n    for entry in timeseries:\n\
          \        labels = entry.get('labels', {})\n        chart = entry.get('chart',\
          \ {}).get('chartData', {})\n        values = [v for v in chart.values()\
          \ if v != 0]\n\n        if len(values) == 0:\n            continue\n\n \
          \       avg = sum(values) / len(values)\n\n        res = {\n           \
          \ \"labels\": labels,\n            \"avg\": avg,\n            \"unit\":\
          \ unit\n        }\n        filtered.append(res)\n\n    top_three = sorted(filtered,\
          \ key=lambda x: x['avg'], reverse=True)[:3]\n    return {\n        \"top_three\"\
          : json.dumps(top_three)\n    }\n"
        code_language: python3
        desc: ''
