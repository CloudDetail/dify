          - '1758697299707'
          - alert_result
        desc: ''
        model:
          mode: chat
          name: gpt-5.4
          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: 1490ddad-e8ce-407f-b466-bdc266afdeeb
          role: system
          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: dd60040b-9a2e-4b70-a27d-b2d550e36d85
          role: user
          text: '# 目的

            根据相关指标数据和相关文档片段，分析告警的正确性或者产生的原因，最后提供恰当的解决思路。

            # 文档数据

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员、业务名称对照等信息。

            2. 优先根据指标数据进行方向判断，确认根因方向之后在文档中检索与根因方向相关的内容。

            3. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。

            4. 如果文档中包含服务名与业务名的映射，则所有出现的服务名称必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如order-service对应订单服务，在描述根因时必须使用订单服务而不是order-service。

            # 分析过程

            根据相关指标数据：容器线程在CPU上的时间消耗{{#1752818532791.output#}}，容器所属服务请求量数据{{#17526597221060.output#}}，告警{{#1744959389144.alertName#}}。

            1. 分析容器线程在CPU上的时间消耗找出并聚焦于消耗最多的几个容器线程，识别容器线程CPU使用峰值区间，如果告警为CPU使用率相关则需要判断是否受告警影响。

            2. 分析服务请求量，识别服务请求量峰值区间。

            3. 分析容器线程CPU使用峰值区间和对应容器所属服务请求量峰值区间，判断容器CPU使用率升高是否由于服务请求量升高引起，判断思路：二者在某时间段内升高趋势高度吻合则有相关性，如果时间段内请求量一直平稳或下降则无相关性。

            4. 从程序运行和程序本身的功能给出告警可能的产生原因和可执行建议，如：

            - 如果与请求量相关：并发连接数超出限制，TCP连接数超过限制，应用层并发数不足；排队与上下文切换开销；拒绝服务攻击 (DoS/DDoS)
            或恶意爬虫；业务高峰或推广活动；等等

            - 如果与请求量无关：频繁GC；无限循环或低效算法；数据库/存储交互瓶颈；正在同步数据/备份；等等

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，一句话描述当前告警异常状况：在xx时间段内哪些实例的线程消耗了多少CPU，时间段内的请求量为xx，并给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。若不涉及容器则回复中忽略容器。格式为：容器xx产生告警xx的根因可能是xx，可能存在xx问题，推荐解决解决方案xx。

            '
