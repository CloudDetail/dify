        prompt_template:
        - id: 5426b9f0-37c8-45b7-9faa-49695110dc7d
          role: system
          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: '# 目的

            根据相关指标结果和相关文档片段，分析告警{{#1744959389144.alertName#}}的正确性或者产生的原因并定位疑似根因容器，最后提供恰当的解决思路。

            # 文档数据

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员、业务名称对照等信息。

            2. 优先根据指标数据进行方向判断，确认根因方向之后在文档中检索与根因方向相关的内容。

            3. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。

            4. 如果文档中包含服务名与业务名的映射，则所有出现的服务名称必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如order-service对应订单服务，在描述根因时必须使用订单服务而不是order-service。

            # 分析过程

            以请分析相关磁盘指标来判断是否由磁盘原因引起主机磁盘利用率异常。

            1. 分析指标数据，每个包含两个数据1.平均异常值最高的几个实例2.平均异常值增速最高的几个实例。容器磁盘读取耗时异常实例、容器磁盘写入异常实例{{#17467776423978.top_abnormal_means#}}{{#17467776423978.top_abnormal_growths#}}{{#17467776423979.top_abnormal_means#}}{{#17467776423979.top_abnormal_growths#}}，找出相关值飙升的容器，若相关值在正常范围内则忽略。

            2. 如果相关指标均在正常范围内，则考虑是否是别的情况引起的磁盘利用率异常。

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。格式为：告警{{#1744959389144.alertName#}}产生的根因疑似是xx容器，可能存在xx问题，推荐解决解决方案xx。

            '
