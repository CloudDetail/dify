          \    red = data.get('data', [])\n    latency_timeseries = []\n    error_timeseries\
          \ = []\n    latency_unit = ''\n    error_unit = ''\n    for metric in red:\n\
          \        if metric.get('title') == 'Response Time':\n            latency_timeseries\
          \ = metric.get('timeseries', [])\n            latency_unit = metric.get('unit')\n\
          \        elif metric.get('title') == 'Error Rate':\n            error_timeseries\
          \ = metric.get('timeseries', [])\n            error_unit = metric.get('unit')\n\
          \    latency_data = {\n        'data': {\n            'timeseries': latency_timeseries,\n\
          \        },\n        'unit': latency_unit,\n    }\n    error_data = {\n\
          \        'data': {\n            'timeseries': error_timeseries,\n      \
          \  },\n        'unit': error_unit,\n    }\n\n    return {\n        \"request_latency\"\
          : json.dumps(latency_data),\n        \"request_error_rate\": json.dumps(error_data)\n\
          \    }\n"
