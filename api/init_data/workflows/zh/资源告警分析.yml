    - data:
        code: "import json\nimport re\n\ndef _strip_think(text: str) -> str:\n   \
          \ return re.sub(r\"<think>.*?</think>\", \"\", text or \"\", flags=re.DOTALL\
          \ | re.IGNORECASE)\n\ndef _extract_json(text: str) -> str:\n    text =\
          \ _strip_think(text).strip()\n    fence = re.search(r\"```(?:json)?\\s*(.*?)```\"\
          , text, re.DOTALL | re.IGNORECASE)\n    if fence:\n        text = fence.group(1).strip()\n\
          \n    starts = [i for i in (text.find(\"{\"), text.find(\"[\")) if i >=\
          \ 0]\n    if not starts:\n        return \"{}\"\n    start = min(starts)\n\
          \    opener = text[start]\n    closer = \"}\" if opener == \"{\" else \"\
          ]\"\n    end = text.rfind(closer)\n    if end < start:\n        return\
          \ \"{}\"\n    return text[start:end + 1]\n\ndef main(raw_data: str) ->\
          \ dict:\n    try:\n        json_str = _extract_json(raw_data)\n        data\
          \ = json.loads(json_str)\n    except Exception:\n        data = {}\n   \
          \ return {\n        \"result\": json.dumps(data, ensure_ascii=False)\n \
          \   }"
