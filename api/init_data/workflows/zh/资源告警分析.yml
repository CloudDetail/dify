          role: user
          text: '# 目的

            根据节流时间告警初步方向判断{{#1752744873302.text#}}和容器线程CPU消耗与请求量关系{{#1752660000891.text#}}以及相关文档片段，给出告警{{#1744959389144.alertName#}}的结论和可执行建议。

            # 文档数据

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

