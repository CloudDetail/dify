    - data:
        code: "import json\n\ndef main(arg1: str, target_pod: str) -> dict:\n    data\
          \ = json.loads(arg1)\n\n    timeseries = data.get(\"data\", {}).get(\"timeseries\"\
          , [])\n    target_pods = target_pod.split(\"|\")\n    pods = []\n    \n\
          \    for entry in timeseries:\n        labels = entry.get(\"labels\", {})\n\
          \        \n        pod = labels.get(\"pod\", None)\n\n        if pod and\
          \ pod not in pods and pod not in target_pods:\n            pods.append(pod)\n\
          \    \n    separator = \"|\"\n    result_str = separator.join(\n       \
          \     str(p) for p in pods\n            if isinstance(p, (str, int))\n \
          \       )\n    return {\n        \"pods\": result_str,\n    }"
