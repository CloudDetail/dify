    - data:
        code: "import json\n\ndef main(data: str):\n    try:\n        timeseries =\
          \ json.loads(data)\n    except (json.JSONDecodeError, TypeError):\n    \
          \    return {\"result\": []}\n        \n    if not isinstance(timeseries,\
          \ list):\n        return {\"result\": []}\n\n    # 使用 dict 的 key 特性来做字典去重\n\
          \    unique_instances = {}\n    \n    # 定义各字段可能出现的键名列表\n    node_keys =\
          \ [\"node\", \"node_name\", \"nodename\", \"nodeName\", \"instance_name\"\
          , \"instanceName\"]\n    container_keys = [\"containerId\", \"container\"\
          ]\n    pod_keys = [\"pod\", \"pod_name\"]\n    pid_keys = [\"pid\"]\n\n\
          \    for entry in timeseries:\n        if not isinstance(entry, dict):\n\
          \            continue\n            \n        labels = entry.get('labels',\
          \ {})\n        \n        # 统一使用 _get_value 提取各字段\n        pod = _get_value(labels,\
          \ pod_keys)\n        container_id = _get_value(labels, container_keys)\n\
          \        node = _get_value(labels, node_keys)\n        pid = _get_value(labels,\
          \ pid_keys)\n\n        # 过滤掉完全没有有效信息的空条目\n        if not any([pod, container_id,\
          \ node, pid]):\n            continue\n\n        # 构造目标 dict 结构\n       \
          \ instance_dict = {\n            \"pod\": pod,\n            \"containerId\"\
          : container_id,\n            \"node\": node,\n            \"pid\": pid\n\
          \        }\n\n        # 生成联合唯一 Key 用于去重\n        unique_key = (pod, container_id,\
          \ node, pid)\n        unique_instances[unique_key] = instance_dict\n\n \
          \   return {\n        \"result\": list(unique_instances.values()[:30])\n\
          \    }\n\ndef _get_value(labels: dict, keys: list[str]):\n    if not isinstance(labels,\
          \ dict):\n        return \"\"\n        \n    for key in keys:\n        value\
          \ = labels.get(key)\n        if value:\n            return str(value)  #\
          \ 确保 pid 等数字类型也能统一转成字符串处理\n\n    return \"\""
