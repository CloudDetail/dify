    - data:
        code: "import json\n\n\ndef main(data_json: str):\n    traces = json.loads(data_json).get('data',\
          \ {}).get('data', [])\n    entries = []\n    seen_entries = set()\n    for\
          \ trace in traces:\n        for span in trace.get('spans', []):\n      \
          \      parent_id = span.get('parentSpanId', '')\n            if not parent_id:\n\
          \                service_name = span.get('serviceName', '')\n          \
          \      endpoint = span.get('name', '')\n                if service_name\
          \ and endpoint and (service_name, endpoint) not in seen_entries:\n     \
          \               entries.append({\n                        \"service\": service_name,\n\
          \                        \"endpoint\": endpoint,\n                    })\n\
          \                    seen_entries.add((service_name, endpoint))\n\n    return\
          \ {\n        \"entries\": entries\n    }\n"
