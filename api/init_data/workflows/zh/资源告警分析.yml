    - data:
        code: "import json\n\ndef main(result_json_str: str) -> dict:\n    try:\n\
          \        # 解析上一步算法输出的 result 字符串\n        data = json.loads(result_json_str)\n\
          \    except (json.JSONDecodeError, TypeError):\n        return {\"instances\"\
          : []}\n\n    if not isinstance(data, dict):\n        return {\"instances\"\
          : []}\n\n    # 从上一步的输出结构中获取 top_usage 和 abnormal 列表\n    top_usage = data.get('top_usage',\
          \ [])\n    abnormal = data.get('abnormal', [])\n    \n    # 确保它们都是列表结构\n\
          \    if not isinstance(top_usage, list): top_usage = []\n    if not isinstance(abnormal,\
          \ list): abnormal = []\n\n    # 将两个列表合并在一起进行实例提取（优先处理 Top 3，再处理异常）\n   \
          \ combined_entries = top_usage + abnormal\n\n    node_keys = ['node', 'node_name',\
          \ 'nodename', 'nodeName', 'instance_name', 'instanceName']\n    unique_instances\
          \ = {}\n\n    for entry in combined_entries:\n        labels = entry.get('labels',\
          \ {})\n        if not isinstance(labels, dict):\n            continue\n\n\
          \        pod = labels.get('pod', '')\n        container_id = labels.get('containerId',\
          \ labels.get('container', ''))  # 智能兼容\n        pid = labels.get('pid',\
          \ '')\n\n        node = ''\n        for key in node_keys:\n            if\
          \ key in labels:\n                node = labels[key]\n                break\n\
          \n        # 如果关键字段全为空，则跳过\n        if not any([pod, container_id, node,\
          \ pid]):\n            continue\n\n        instance_dict = {\n          \
          \  \"pod\": pod,\n            \"containerId\": container_id,\n         \
          \   \"node\": node,\n            \"pid\": pid\n        }\n\n        # 核心去重逻辑（利用元组作为字典的\
          \ key）\n        unique_key = (pod, container_id, node, pid)\n        unique_instances[unique_key]\
          \ = instance_dict\n\n    # 原代码中的 list(...values()[:30]) 语法在 Python 中会报 TypeError（dict_values\
          \ 不支持切片）\n    # 这里修正为先转 list，再取前 30 个元素\n    return {\n        \"instances\"\
          : list(unique_instances.values())[:30]\n    }"
