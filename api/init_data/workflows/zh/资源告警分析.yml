    - data:
        code: "def main(arg1: str) -> dict:\n    data = json.loads(arg1)\n    \n \
          \   timeseries = data.get(\"data\", {}).get(\"timeseries\", [])\n    \n\
          \    namespaces = []\n    pods = []\n    pids = []\n    for entry in timeseries:\n\
          \        labels = entry.get(\"labels\", {})\n        \n        namespace\
          \ = labels.get(\"namespace\", None)\n        pod = labels.get(\"pod\", None)\n\
          \        pid = labels.get(\"pid\", None)\n        \n        if namespace\
          \ and namespace not in namespaces:\n            namespaces.append(namespace)\n\
          \n        if pod and pod not in pods:\n            pods.append(pod)\n  \
          \      \n        if pid and pid not in pids:\n            pids.append(pid)\n\
          \    \n    output = {\"namespaces\": namespaces, \"pods\": pods, \"pids\"\
          : pids}\n    return {\n        \"result\": json.dumps(output)\n    }"
        code_language: python3
        desc: ''
        outputs:
          result:
            children: null
            type: string
        selected: false
        title: 获取所有pod和namespace组合
        type: code
        variables:
