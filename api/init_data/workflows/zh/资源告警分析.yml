    - data:
        code: "import json\n\ndef main(topology_str: str): \n    \"\"\"\n    From\
          \ {current: {}, parents: [], children: []} to [service1, service2...]\n\
          \    \"\"\"\n    if \"Error\" in topology_str:\n        return {\n     \
          \       \"result\": []\n        }\n    topology = json.loads(topology_str).get(\"\
          data\", {})\n    services = []\n    for service in topology.get(\"parents\"\
          , []):\n        service_name = service.get(\"service\")\n        if service_name:\n\
          \            services.append(service.get(\"service\"))\n    \n    for service\
          \ in topology.get(\"children\", []):\n        service_name = service.get(\"\
          service\")\n        if service_name:\n            services.append(service.get(\"\
          service\"))\n\n    current_service_name = topology.get(\"current\", {}).get(\"\
          service\")\n    if current_service_name:\n        services.append(current_service_name)\n\
          \    \n    return {\n        \"result\": services\n    }"
        code_language: python3
