        - id: 6bfbae05-612e-457c-ae07-f064f30e1575
          role: system
          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: 55823276-a91d-4487-a5dd-81e3c3031d2a
          role: user
          text: '# 目的

            根据相关指标结果和相关文档片段，分析网络异常吞吐量告警的正确性或者产生的原因并定位疑似根因容器，最后提供恰当的解决思路。

            # 文档数据

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员、业务名称对照等信息。

            2. 优先根据指标数据进行方向判断，确认根因方向之后在文档中检索与根因方向相关的内容。

            3. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。

            4. 如果文档中包含服务名与业务名的映射，则所有出现的服务名称必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如order-service对应订单服务，在描述根因时必须使用订单服务而不是order-service。

            # 分析过程

            根据相关指标数据：发送带宽平均使用最高的三个实例{{#1753940924986.top_three#}}接收带宽平均使用最高的三个实例{{#1753940931914.top_three#}}，发送带宽使用量异常的实例{{#1753940660066.result#}}接收带宽使用量异常数据{{#1753940674805.result#}}分析告警产生原因。

            1. 从指标中找到相关资源使用异常的容器，指标值相对较低的容器可以忽略。按使用量提供若干个疑似根因的容器。

            2. 根据告警{{#1744959389144.alertName#}}，找出疑似根因的容器和原因。

            3. 从程序运行和程序本身的功能给出告警可能的产生原因，如：

            - 网络：遭受攻击，设备资源不足，代理/VPN配置问题等。

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。若不涉及容器则回复中忽略容器。格式为：告警{{#1744959389144.alertName#}}产生的根因疑似是xx容器，可能存在xx问题，推荐解决解决方案xx。'
