          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: '# 目的

            根据相关指标结果，分析告警{{#1744959389144.alertName#}}的正确性或者产生的原因并定位疑似根因容器，最后提供恰当的解决思路。


            # 分析过程

            主机的磁盘利用率出现异常，初步推断是由SWAP区引起的，所以请分析相关指标来判断是否由于内存原因引起磁盘利用率升高异常。

            1. 分析指标数据异常均值最高的几个实例{{#174677764239710.top_abnormal_means#}}和异常增速最高的几个实例{{#174677764239710.top_abnormal_growths#}}，找出相关值飙升的容器，若相关值在正常范围内则忽略。

            2. 如果相关指标均在正常范围内，则考虑是否是别的情况引起的磁盘利用率异常。

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。格式为：告警{{#1744959389144.alertName#}}产生的根因疑似是xx容器，可能存在xx问题，推荐解决解决方案xx。

            '
