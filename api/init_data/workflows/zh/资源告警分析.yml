            7. 没有 namespace、pod、service 等真实对象时，不要编造 kubectl 命令里的对象名；可以写“补齐命名空间和 Pod 后执行”。\n\
            \n# suggest字段要求\n1. 每条建议必须包含 action、summary、level；有明确依据时补充 verification、verificationSummary、trigger、risk。\n\
