        - id: ffc64099-5503-4da5-902e-25740ddf2b3a
          role: user
          text: '# 任务

            帮助分析服务进程消亡是否与恶意请求有关并给出一个总结报告。

            根据服务请求量和成功率数据以及服务进程上一次被探测到的时间（秒），分析服务不可用是否是由于遭受恶意攻击造成。

            # 数据

            服务请求成功率{{#1753426534118.text#}}（其中时间戳单位为微秒），服务请求量{{#1753437328850.tps#}}（其中时间戳单位为微秒），进程上一次被探测到的时间{{#1753436915396.text#}}，告警{{#1742807803325.alertName#}}，进程名{{#1742807803325.comm#}}。

            # 分析思路

            1. 如果请求成功率一直为0，则代表没有请求成功率数据（这段时间内没有请求，所以成功率为0），如果请求量也为0，代表不存在恶意请求。

            2. 如果服务请求量和请求成功率一直处于平稳状态，或者没有相关数据，则认为进程消失与其无关，提示可能为短命的异步工作进程，属于正常现象。

            3. 如果有相关数据，判断服务请求量是否符合下面规则：在进程探测时间之前处于上升且达到很高的水平，请求成功率在进程探测时间之间处于下降且达到较低水平；在进程探测时间之后请求量迅速下降并趋于平稳，成功率稳定在一个合理水平（注意此时由于进程可能消失，两个数据可能均为较低水平），如果符合这个规则则认为进程消失由于资源使用引起。

            # 输出

            1. 按时间区间总结服务请求量和成功率的趋势，并判断服务不可用是否可能存在恶意请求，如果无关无需给出不可用的额外推测原因。

            2. 输出要包含完整的告警上下文信息，服务xx在xx时间段发生了xx告警+你给出的告警总结。

            '
