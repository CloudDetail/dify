        - id: 77620c0c-48c7-4bf4-b0ea-2d673be4b5e3
          role: user
          text: '# 任务

            根据日志内容和相关文档结合你的经验分析服务不可用原因和推测是内部问题还是外部问题并给出根因。

            # 文档

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务{{#1753414255071.result#}}相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员等信息。

            2. 优先根据日志内容进行方向判断，确认根因方向之后在文档中检索与根因方向相关的内容。

            3. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。

            4. 如果文档中包含服务名与业务名的映射，则所有出现的服务名称必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如order-service对应订单服务，在描述根因时必须使用订单服务而不是order-service。

            # 数据

            告警事件：{{#1742807803325.alertName#}}

            时间段内自身错误相关日志：{{#1753687345334.error_logs_str#}}

            服务：{{#1753414255071.result#}}

            # 分析思路

            聚焦于告警和相关的错误日志，按时间点总结错误原因，根据日志上下文判断是应用自身原因还是外部依赖原因。

            # 输出

            1. 给出问题产生的原因是内部还是外部，如果是外部原因尝试总结出出错的外部服务。

            2. 按时间和内容总结错误日志。

            3. 输出要包含完整告警上下文，服务在xx时间产生了xx告警，推断为内部/外部原因，相关日志为xx，可能原因是xx。'
