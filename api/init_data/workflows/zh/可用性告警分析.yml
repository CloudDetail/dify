    - data:
        code: "import json\n\n\ndef main(contact_json_str: str, alert_json_str: str)\
          \ -> dict:\n    include_metadata = False\n\n    contact_data = json.loads(contact_json_str)\n\
          \    alert_data = json.loads(alert_json_str)\n    contact_records = contact_data.get('records',\
          \ [])\n    alert_records = alert_data.get('records', [])\n\n    if not include_metadata:\n\
          \        for record in contact_records:\n            record.pop('metadata',\
          \ None)\n        for record in alert_records:\n            record.pop('metadata',\
          \ None)\n\n    # 合并两个 records 并根据 content 去重\n    all_records = contact_records\
          \ + alert_records\n    unique_records = []\n    seen_contents = set()\n\n\
          \    for record in all_records:\n        content = record.get('content')\n\
          \        if content not in seen_contents:\n            unique_records.append(record)\n\
          \            seen_contents.add(content)\n\n    if include_metadata:\n  \
          \      return {\n            'contact_result': contact_json_str,\n     \
          \       'alert_result': alert_json_str,\n            'all_result': json.dumps({'records':\
          \ unique_records})\n        }\n\n    return {\n        'contact_result':\
          \ json.dumps({'records': contact_records}),\n        'alert_result': json.dumps({'records':\
          \ alert_records}),\n        'all_result': json.dumps({'records': unique_records})\n\
          \    }\n"
        code_language: python3
        desc: ''
        outputs:
          alert_result:
