        - id: 615ece65-9193-4bad-a375-d51b67dbaafc
          role: system
          text: 你是一位可观测性领域智能助手，帮助用户分析解决问题。
        - id: cc52b45f-d678-4d55-98d1-7ed48f7b4091
          role: user
          text: '# 目的

            根据异常pod，结合相关日志和相关文档以及你的经验，分析告警{{#1742807803325.alertName#}}

            产生的原因和对{{#1753414255071.result#}}

            或{{#1742807803325.pod#}}

            的影响，最后推测是内部问题还是外部问题。

            # 文档

            {{#context#}}

            ## 使用要求

            优先根据文档中的与当前告警或服务{{#1753414255071.result#}}相关的内容进行回答，如果文档中没有相关内容则根据你的经验回答。如果使用了文档中的内容要给内容出处文档名称，表明是“根据xx文档，推断出/可能是xxx”。

            1. 注意关键寻找文档中包括但不限于历史告警、解决思路、负责人员等信息。

            2. 优先根据日志内容进行方向判断，确认根因方向之后在文档中检索与根因方向相关的内容。

            3. 需要聚焦于与根因方向相关的文档片段，忽略无关的文档片段。

            4. 如果文档中包含服务名与业务名的映射，则所有出现的服务名称必须使用业务名描述，且不能遗漏，没有则忽略这条规则。如order-service对应订单服务，在描述根因时必须使用订单服务而不是order-service。

            # 数据

            数据包括：

            1. 对应时间内的error日志{{#1758787397171.error_logs_str#}}


            # 分析思路

            结合异常pods和日志，找到出错pods和对应的错误内容，分析错误原因。如果没有异常日志则提示用户主动查看相关时间内的日志内容，并提醒用户配置日志解析规则。


            # 注意事项

            - 时间单位均为微秒


            # 输出内容

            告警{{#1742807803325.alertName#}}

            产生的原因是xx，对

            {{#1742807803325.pod#}}或{{#1742807803325.service#}}

            的影响是：哪些pods出错，具体日志为xx。


            解决方案：xx'
