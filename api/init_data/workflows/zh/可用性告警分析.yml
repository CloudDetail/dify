            type为故障方向\n1. 第三方依赖，如调用数据、第三方API出错（type:thirdparty）；配置问题，如获取配置文件失败、链接数据库失败(type:config)；代码异常，如未捕获的异常、数组越界(type:code)；下游服务错误(type:downstream)，如调用下游服务出错、下游返回500错误码；系统资源异常，如内存或CPU使用过多(type:system)，自身出现错误（type:self），如注入故障、出现异常，每个方向直给一个结论即可，不涉及到方向不要给出，不要重复。主要根因方向必须和major结论保持一致，不要不统一。\n\
            2. 且必须给一个有问题的方向(level为major)\n3. 列表必须按照等级排序level从高到低维（major,minor,normal）\n\
            4. cause内容只能为第三方依赖错误，配置问题，代码异常，下游服务调用错误，系统资源\n#格式模版\n```json\n{\n    \
            \    \"cause\": \"主要原根因方向\",\n        \"other\": [\n            {\n  \
            \              \"reason\": \"\",\n                \"type\": \"thirdparty\"\
            ,\n                \"level\": \"major/minor/normal\"\n            },\n\
            \            {\n                \"reason\": \"\",\n                \"\
            type\": \"code\",\n                \"level\": \"minor\"\n            },\n\
            \            {\n                \"reason\": \"\",\n                \"\
            type\": \"config\",\n                \"level\": \"normal\"\n         \
            \   },\n            {\n                \"reason\": \"\",\n           \
            \     \"type\": \"downstream\",\n                \"level\": \"normal\"\
            \n            },\n            {\n                \"reason\": \"\",\n \
            \               \"type\": \"system\",\n                \"level\": \"normal\"\
            \n            }\n        ]\n    }\n```\n#输出格式\ntype只能为第三方依赖（thirdparty），配置问题(config)，代码异常(code)，下游服务错误(downstream)，系统资源异常(system)这几种，不要有其他内容\n\
            json格式数据，格式参数模版，不要有其他输出"
