        - id: 9447a640-941c-4ddc-a0fb-904e21b8d782
          role: user
          text: '# 任务

            服务的进程{{#1742807803325.pid#}}持续一段时间不活跃，已知根据日志没有分析出具体原因现在分析服务进程消亡与资源使用量是否有关并给出一个简单总结。

            根据服务所在主机资源使用数据和服务进程上一次被探测到的时间，分析进程服务不可用是否与资源使用相关，并给出一句简单总结。

            # 数据

            时间段内的主机cpu使用量{{#1753691763954.text#}}（其中时间戳单位为微秒），时间段内的主机内存使用量{{#1753691720044.text#}}（其中时间戳单位为微秒），进程上一次被探测到的时间{{#1753436915396.text#}}(秒)，告警{{#1742807803325.alertName#}}，进程名{{#1742807803325.comm#}}。

            # 分析思路

            1. 如果资源使用量一直处于平稳状态，或者没有相关数据则认为进程消失与资源使用无关，提醒用户可能为异步工作进程，属于正常现象。

            2. 如果进程已经消失一段时间，判断资源使用量是否符合在进程探测时间之前处于上升且达到很高的水平，在进程探测时间之后迅速下降并趋于平稳，如果符合这个规则则认为进程消失由于资源使用引起。

            # 输出

            1. 按时间区间总结主机cpu和内存的使用趋势，并判断服务不可用是否与资源使用过多有关，无需给出不可用的额外推测原因。

            2. 输出要包含完整的告警上下文信息，服务xx在xx时间段发生了xx告警+你给出的告警总结。

            '
