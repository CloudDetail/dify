        - id: 5426b9f0-37c8-45b7-9faa-49695110dc7d
          role: system
          text: 你是一名可观测性领域智能助手和排障专家，帮助用户分析出现告警的原因。
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: '# 目的

            根据相关指标结果，分析告警{{#1744959389144.alertName#}}的正确性或者产生的原因并定位疑似根因容器，最后提供恰当的解决思路。


            # 分析过程

            主机的CPU IO wait出现异常，但是主机的磁盘IO利用率在正常范围内，所以请分析相关网络指标来判断是否由于网络原因引起CPU IO wait异常。

            1. 分析指标数据{{#1743848302527.text#}}、{{#1743848306370.text#}}、{{#1743848316998.text#}}、{{#1743848323475.text#}}，找出相关值飙升的容器，若相关值在正常范围内则忽略。

            2. 如果相关指标均在正常范围内，则考虑是否是别的情况引起的CPU IO wait异常。比如：远程存储相应过慢、网络延时升高、数据库远程查询过慢等。

            # 输出

            - 若相关值在正常范围内，给出你推断的产生告警的其他原因。

            - 若相关值异常，给出你推断出的疑似根因的所有容器、疑似原因和建议解决方案。格式为：告警{{#1744959389144.alertName#}}产生的根因疑似是xx容器，可能存在xx问题，推荐解决解决方案xx。

            '
