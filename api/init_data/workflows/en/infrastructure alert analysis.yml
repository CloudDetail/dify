        prompt_template:
        - id: 5426b9f0-37c8-45b7-9faa-49695110dc7d
          role: system
          text: You are an intelligent assistant and troubleshooting expert in the
            observability domain, assisting users in analyzing the reasons behind
            alerts.
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: "# Objective\nBased on the relevant metric results, analyze the correctness\
            \ or cause of the alert, identify the suspected root cause container,\
            \ and provide appropriate resolution strategies.\n\n# Analysis Process\n\
            Using the relevant metric data: 1. Instance with the highest average anomaly\
            \ point {{#1745894017978.top_abnormal_means#}}, 2. Instance with the highest\
            \ average anomaly growth rate {{#1745894017978.top_abnormal_growths#}},\
            \ analyze the cause of the alert.\n1. Identify containers with abnormal\
            \ resource usage from the metrics; containers with relatively low metric\
            \ values can be ignored. Provide a list of suspected root cause containers\
            \ based on usage.\n2. Based on the alert {{#1744959389144.alertName#}},\
            \ identify the suspected root cause containers and reasons.\n3. Provide\
            \ possible causes of the alert based on program execution and the program's\
            \ functionality, such as:\n   - **CPU**: Frequent garbage collection,\
            \ inefficient algorithms, infinite loops, etc.\n   - **Memory**: Memory\
            \ leaks, oversized data structures, prolonged object lifecycles, etc.\n\
            \   - **Network**: Under attack, insufficient device resources, proxy/VPN\
            \ configuration issues, etc.\n   - **Disk**: Accumulation of large files\
            \ (logs), high I/O load, etc.\n\n# Output\n- If the relevant values are\
            \ within normal ranges, provide other inferred reasons for the alert.\n\
            - If the relevant values are abnormal, provide all suspected root cause\
            \ containers, suspected reasons, and recommended solutions. If containers\
            \ are not involved, omit containers in the response. Format: The root\
            \ cause of the alert {{#1744959389144.alertName#}} is suspected to be\
            \ the xx container, potentially due to xx issue, with recommended solution\
            \ xx."
