    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: 5426b9f0-37c8-45b7-9faa-49695110dc7d
          role: system
          text: You are an intelligent assistant and troubleshooting expert in the
            observability domain, assisting users in analyzing the reasons behind
            alerts.
        - id: 394f3fde-0d44-43dc-9c6d-6737b88c199d
          role: user
          text: '# Objective

            Based on the relevant metric results, analyze the correctness or cause
            of the alert {{#1744959389144.alertName#}}, identify the suspected root
            cause container, and provide appropriate resolution strategies.


            # Analysis Process

            The host''s CPU IO wait is abnormal, but the host''s disk IO utilization
            is within normal ranges. Therefore, analyze relevant network metrics to
            determine if the CPU IO wait anomaly is caused by network issues.

            1. Analyze metric data, with each set including the instance with the
            highest average anomaly point and the instance with the highest anomaly
            growth rate. Instances with abnormal received error packets {{#17458959866650.top_abnormal_means#}}{{#17458959866650.top_abnormal_growths#}},
            abnormal sent error packets {{#17458959892670.top_abnormal_means#}}{{#17458959903430.top_abnormal_growths#}},
            abnormal received packet loss {{#17458959903430.top_abnormal_means#}}{{#17458959903430.top_abnormal_growths#}},
            and abnormal sent packet loss {{#17458959879420.top_abnormal_means#}}{{#17458959879420.top_abnormal_growths#}}.
