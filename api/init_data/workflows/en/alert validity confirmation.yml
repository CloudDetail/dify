    - data:
        code: "import requests\nimport json\n\nAPO_URL = \"http://apo-backend-svc:8080\"\
          \n\nAPO_VM = \"http://apo-victoria-metrics-single-server-svc:8428\"\n\n\
          DEBUG_OUTPUT = False\n\n\nclass Utils:\n    @staticmethod\n    def get_step(start_time:\
          \ int, end_time: int) -> dict:\n        time_diff = end_time - start_time\n\
          \n        SECOND = 1000000  # microseconds\n        MINUTE = 60 * SECOND\n\
          \        HOUR = 60 * MINUTE\n\n        step = SECOND  # default step is\
          \ 1 second\n        stepStr = \"1s\"\n        if time_diff <= 15 * MINUTE:\n\
          \            step = 30 * SECOND\n            stepStr = \"30s\"\n       \
          \ elif time_diff <= 30 * MINUTE:\n            step = 1 * MINUTE\n      \
          \      stepStr = \"1m\"\n        elif time_diff <= 1 * HOUR:\n         \
          \   step = 2 * MINUTE\n            stepStr = \"2m\"\n        elif time_diff\
          \ <= 1.5 * HOUR:\n            step = 3 * MINUTE\n            stepStr = \"\
          3m\"\n        elif time_diff <= 3 * HOUR:\n            step = 6 * MINUTE\n\
          \            stepStr = \"6m\"\n        elif time_diff <= 6 * HOUR:\n   \
          \         step = 12 * MINUTE\n            stepStr = \"12m\"\n        elif\
          \ time_diff <= 12 * HOUR:\n            step = 24 * MINUTE\n            stepStr\
          \ = \"24m\"\n        elif time_diff <= 15 * HOUR:\n            step = 30\
          \ * MINUTE\n            stepStr = \"30m\"\n        elif time_diff <= 30\
          \ * HOUR:\n            step = 1 * HOUR\n            stepStr = \"1h\"\n \
          \       else:\n            step = ((time_diff + 30 * SECOND - 1) // (30\
          \ * SECOND)) * SECOND\n            custom = (time_diff + 30 * SECOND - 1)\
          \ // (30 * SECOND)\n            stepStr = f\"{custom}s\"\n\n        return\
          \ {\n            \"step\": step,\n            \"stepStr\": stepStr,\n  \
          \      }\n\n    @staticmethod\n    def get_avg(data_json) -> dict:\n   \
          \     results = data_json[\"data\"][\"result\"]\n\n        stats = {}\n\n\
          \        for entry in results:\n            tid = entry[\"metric\"][\"tid\"\
          ]\n            values = [float(value[1]) for value in entry[\"values\"]]\n\
          \n            stats[tid] = {\n                \"avg\": sum(values) / len(values),\n\
          \            }\n\n        return stats\n\n    @staticmethod\n    def extract_values(thread_data:\
