        prompt_template:
        - id: cd35fff4-a037-4e72-af99-2ff8299fc5d2
          role: system
          text: You are an intelligent assistant in the field of observability, helping
            users analyze and solve problems.
        - id: 2b2ad468-efcd-4bcc-aeb9-d53d2f2770ad
          role: user
          text: '# Analysis Objective

            Based on the abnormal thread data across resource categories, determine
            whether the application instance {{#1741497181784.pod#}} is affected by
            the alarm event {{#1742807803325.alertName#}}, and perform preliminary
            root cause location.


            # Input Data Specification

            - **Data by resource category**: thread delay and related North Star indicators
            (such as network delay corresponding to network RTT).

            - **Abnormal data point count**: the number of instances with delay exceeding
            20% ​​of the historical average of threads of the same type, and the thread
            delay average needs to be marked.


            # Analysis Rules

            1. **Main abnormal direction determination**

            - Mark the average delay of abnormal threads.

            - Identify the resource type with the most significant delay increase
            (such as the delay jumping from milliseconds to seconds).

            - **Thread number priority principle**: If a resource type (such as network/epoll)
            has the largest number of abnormal threads, it is attributed to that category.

            *Example: 4 network/epoll abnormal threads vs 2 CPU abnormal threads →
            attributed to network problems. *


            2. **Misjudgment avoidance**

            - If the CPU or run queue (RunQ) delay increases suddenly and there is
            no concurrent network/epoll abnormality, it is preferentially attributed
            to CPU resource contention.


            3. **Priority decision (descending)**

            `CPU > Network > Epoll > File > RunQ`


            # Root cause attribution and suggestions

            - **CPU delay increases suddenly**: Check for excessive code nesting issues,
            and perform version rollback after confirmation.

            - **CPU preemption is too high**: Check for resource contention of processes
            on the same node.

            - **Network/Epoll delay increases suddenly**:

            - If RTT is abnormal → network link problem;

            - If RTT is normal → downstream service delay problem.

            - **File operation delay increases**: Audit file handle leaks.


            # Output format

            **Application example**: {{#1741497181784.pod#}}

            **North Star indicator trend summary**

            - Describe significant changes by indicator dimension. If there is no
            abnormality, mark "No significant deviation observed".


            **Preliminary root cause conclusion**

            - Clarify the impact of the alarm event on the application.

            - Output a single attribution conclusion based on the North Star indicator
            and analysis rules.

            *Note: If the network/Epoll class is abnormal but the RTT is normal, it
            is attributed to downstream service delay. *


            # Input data

            - CPU: {{#1744342920172.result#}}

            - Network: {{#1744342846753.result#}}

            - File: {{#1744342890395.result#}}

            - Epoll: {{#1744342800777.result#}}

            - RunQ: {{#1744342609856.result#}}


            # Output guidelines

            - Use concise, non-technical statements to avoid ambiguity.

            - Conclusions should focus on actionable suggestions (e.g. "Check code
            nesting" rather than "Possible performance issues").'
        selected: false
