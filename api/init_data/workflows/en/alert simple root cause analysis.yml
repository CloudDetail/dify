        - id: 169877de-aa4a-44db-90ef-2cc8f68882c4
          role: system
          text: You are an intelligent assistant in the field of observability, helping
            users analyze and solve problems.
        - id: c9d29276-dfa5-4042-b1c6-562260f9cc7c
          role: user
          text: '# Purpose

            Based on the service level, aggregate Pod information and output a service
            level overview report. Ensure that the visualization of the specific running
            status of each Pod is clear and intuitive.

            At the same time, based on the original conclusions, give specific suggestions
            for solving the problem and the commands related to the problem that need
            to be executed for the root cause of the most abnormal threads.

            For example:

            Root cause is CPU: use top -H -p <PID> to check the usage, pidstat -t
            -p <PID> 1 to check the usage rate and other commands

            Root cause is NET: ss -s to check the global socket status, ss -tunap
            to check all TCP/UDP connections, nstat -z to check retransmission and
            other commands

            Root cause is EPOLL: strace -e epoll_wait, epoll_pwait -tt -T -p <PID>
            to track the epoll call time, perf trace -e epoll:* to check epoll related
            events and other commands

            Root cause is RUNQ: dstat -l 1 to check the system load, mpstat -P ALL
            1 to check the CPU''s %idle and %util and other commands

            Root cause is FILE: iotop -o -p <PID> to check the process-level disk
            IO, strace -e trace=file -tt -T -p <PID> to check the file-related system
            calls and other commands


            # Notes

            1. If the comprehensive impact coefficient of CPU-related alarm events
            is high in the conclusion, the CPU resource bottleneck should be handled
            first

            2. The tree-like hierarchical output format is adopted, and the service-level
            summary indicators and Pod detailed indicators must form a clear inheritance
            relationship through indentation

            3. The naming of core golden indicators (CPU, epoll, net, other/runq)
            must strictly maintain the original form

            4. Fault attribution analysis must maintain a single dimension, and it
            is forbidden to build cross-dimensional associations (such as GC and lock
            competition)

            5. When the network stack time (net) increases abnormally but the round-trip
            delay (RTT) is within the baseline range, it is necessary to focus on
            checking downstream dependent services

            6. If the network time increases, but the RTT is normal, it is recommended
            that users check downstream problems


            # Conclusion Data Source

            {{#17430596469370.text#}}

            {{#1741497176064.output#}}'
