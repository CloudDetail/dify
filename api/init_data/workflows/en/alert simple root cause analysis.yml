        context:
          enabled: false
          variable_selector: []
        desc: ''
        isInIteration: true
        iteration_id: '1741497176064'
        model:
          completion_params:
            temperature: 0.6
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: cd35fff4-a037-4e72-af99-2ff8299fc5d2
          role: system
          text: You are an intelligent assistant in the field of observability, helping
            users analyze and solve problems.
        - id: 2b2ad468-efcd-4bcc-aeb9-d53d2f2770ad
          role: user
          text: '# Analysis Objective

            Based on the abnormal thread data across resource categories, determine
            whether the application instance {{#17430589567120.pod#}} is affected
            by the alarm event {{#1742807803325.alertName#}}, and conduct preliminary
            root cause location.


            # Input Data Specification

            - **Data by Resource Category**: Thread latency and related North Star
            indicators (such as network latency plus corresponding abnormal network
            RTT data, do not ignore RTT data).

            - **Abnormal Data Point Count**: The number of instances whose latency
            exceeds 20% of the historical average of threads of the same type, and
            the average thread latency needs to be marked.


            # Analysis Rules

            1. **Main Abnormal Direction Determination**

            - Mark the average latency of abnormal threads.

            - Identify the resource type with the most significant latency increase
            (such as latency jumping from milliseconds to seconds).

            - **Thread Quantity Priority Principle**: If a resource type (such as
            network/epoll) has the largest number of abnormal threads, it is attributed
            to that category. Please carefully analyze the number of abnormal threads
            in each direction.

            *Example: 4 network/epoll abnormal threads vs 2 CPU abnormal threads →
            attributed to network direction problems. *


            2. **Misjudgment avoidance**

            - If the CPU or run queue (RunQ) delay increases suddenly and there is
            no concurrent network/epoll abnormality, it is preferentially attributed
            to CPU resource contention.


            3. **Priority decision (descending)**

            ''CPU > Network > Epoll > File > RunQ''


            # Root cause attribution and suggestions

            - **CPU delay increases suddenly**: Check for excessive code nesting problems,
            and perform version rollback after confirmation.

            - **CPU preemption is too high**: Check for resource contention of processes
            on the same node.

            - **Network/Epoll delay increases suddenly**:

            - If RTT is abnormal → Network link problem;

            - If RTT is normal → Downstream service delay problem.

            - **File operation delay increases**: Audit file handle leaks.


            # Output format

            **Application example**:{{#17430589567120.pod#}}

            **North Star indicator trend summary**

            - Describe significant changes by indicator dimension. If there is no
            abnormality, mark "No significant deviation observed".


            **Preliminary root cause conclusion**

            - Clearly define the impact of the alarm event on the application.

            - Output a single attribution conclusion based on the North Star indicator
            and analysis rules.

            *Note: If the network/Epoll class is abnormal but the RTT is normal, it
            is attributed to downstream service delay. *

            Note: If there is a report in the corresponding direction, the report
            link needs to be displayed, click


            # Input data

            -cpu: {{#17443388433580.result#}}

            - net: {{#17443388438160.result#}}

            - file: {{#17443388421360.result#}}

            - epoll: {{#1744290470304.result#}}

            - RunQ: {{#17443388443000.result#}}


            # Report link (just indicate that it is a report, no need to associate
            threads)

            cpu {{#1745388058502.text#}}

            network direction {{#17453881280910.text#}}

            runq direction {{#17453881639600.text#}}


            # Output Guidelines

            - Use concise, non-technical expressions to avoid ambiguity.

            - Conclusions should focus on actionable suggestions (e.g. "check code
            nesting" instead of "there may be performance issues").'
